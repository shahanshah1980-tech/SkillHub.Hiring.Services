<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillHub Worker Registration</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
}

.container {
    width: 750px;
    margin: 20px auto;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    color: white;
}

.input-group {
    margin: 12px 0;
}

input, select {
    width: 95%;
    height: 45px;
    border-radius: 50px;
    border: none;
    padding: 0 15px;
}

.gender-box {
    display: flex;
    justify-content: space-around;
}

.button-group {
    text-align: center;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border-radius: 50px;
    border: none;
    background: #ff758c;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1 style="text-align:center;color:white;">SkillHub Hiring Services</h1>

<div class="container">

<h2>Worker Registration</h2>

<!-- Personal -->
<h3>Personal Details</h3>

<div class="input-group">
<input type="text" id="name" placeholder="Full Name">
</div>

<div class="input-group">
<input type="text" id="father" placeholder="Father Name">
</div>

<div class="input-group">
<input type="text" id="dob" placeholder="Date of Birth">
</div>

<div class="gender-box">
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Other"> Other</label>
</div>

<!-- Contact -->
<h3>Contact Details</h3>

<div class="input-group">
<input type="text" id="mobile" placeholder="Mobile Number">
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email">
</div>

<div class="input-group">
<input type="text" id="address" placeholder="Address">
</div>

<!-- Service -->
<h3>Service Details</h3>

<div class="input-group">
<select id="type" onchange="loadOptions()">
<option value="">Select Type</option>
<option value="worker">Worker</option>
<option value="vehicle">Vehicle</option>
</select>
</div>

<div class="input-group">
<select id="subtype"></select>
</div>

<div class="input-group" id="vehicleBox" style="display:none;">
<input type="text" placeholder="Vehicle Number">
</div>

<!-- Documents -->
<h3>Documents</h3>

<div id="docList">
<label><input type="checkbox" value="Aadhar"> Aadhar</label><br>
<label><input type="checkbox" value="Passport"> Passport</label><br>
<label><input type="checkbox" value="Driving License"> Driving License</label>
</div>

<div id="selectedDocs"></div>

<!-- File -->
<div class="input-group">
<input type="file" id="cv">
<button onclick="viewFile()">View File</button>
</div>

<!-- Buttons -->
<div class="button-group">
<button onclick="save()">Submit</button>
<button onclick="resetForm()">Reset</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>

// Date picker
flatpickr("#dob", { dateFormat: "d/m/Y" });

// Worker & Vehicle List
const workerList = ["Labour","Helper","Mason","Carpenter","Electrician"];
const vehicleList = ["Bike","Car","Truck","Bus"];

function loadOptions() {
    let type = document.getElementById("type").value;
    let sub = document.getElementById("subtype");
    let vehicleBox = document.getElementById("vehicleBox");

    sub.innerHTML = "<option>Select Option</option>";

    if(type === "worker"){
        vehicleBox.style.display = "none";
        workerList.forEach(i => sub.add(new Option(i,i)));
    }
    else if(type === "vehicle"){
        vehicleBox.style.display = "block";
        vehicleList.forEach(i => sub.add(new Option(i,i)));
    }
}

// Documents
const checkboxes = document.querySelectorAll("#docList input");
const display = document.getElementById("selectedDocs");

checkboxes.forEach(cb => {
    cb.addEventListener("change", () => {
        let selected = [];
        checkboxes.forEach(c => {
            if(c.checked) selected.push(c.value);
        });

        display.innerHTML = selected.length 
        ? "Selected: " + selected.join(", ")
        : "";
    });
});

// Save
function save(){
    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let gender = document.querySelector('input[name="gender"]:checked');

    if(!name || !mobile || !gender){
        alert("Fill all required fields");
        return;
    }

    alert("Saved Successfully");
}

// Reset
function resetForm(){
    location.reload();
}

// View File
function viewFile(){
    let file = document.getElementById("cv");

    if(!file.files.length){
        alert("Upload file first");
        return;
    }

    let url = URL.createObjectURL(file.files[0]);
    window.open(url);
}

</script>

</body>
</html>
