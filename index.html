<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    text-align:center;
    margin-top:60px;
}

.title{
    font-size:32px;
    font-weight:bold;
    color:#0078d7;
    margin-bottom:25px;
}

.container{
    background:white;
    width:360px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    font-size:16px;
}

.btns{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#0078d7;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.signup{
    background:#0078d7;
}

.back{
    background:#ff9800;
}

.create{
    background:#0078d7;
}

.cancel{
    background:#0078d7;
}

.otp-container{
    display:flex;
    justify-content:center;
    gap:4px;
    margin-top:10px;
    display:none;
}

.otp-box{
    width:22px;
    height:22px;
    font-size:14px;
    text-align:center;
    padding:0;
}

#signupForm{
    display:none;
}
</style>

</head>
<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN FORM -->
<div class="container" id="loginForm">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <div class="otp-container" id="otpContainer">
        <input class="otp-box" maxlength="1" disabled onkeyup="move(this,0,event)">
        <input class="otp-box" maxlength="1" disabled onkeyup="move(this,1,event)">
        <input class="otp-box" maxlength="1" disabled onkeyup="move(this,2,event)">
        <input class="otp-box" maxlength="1" disabled onkeyup="move(this,3,event)">
        <input class="otp-box" maxlength="1" disabled onkeyup="move(this,4,event)">
        <input class="otp-box" maxlength="1" disabled onkeyup="move(this,5,event)">
    </div>

    <div class="btns">
        <button onclick="login()">Login</button>
        <button class="signup" onclick="openSignup()">Signup</button>
    </div>
</div>

<!-- SIGNUP FORM -->
<div class="container" id="signupForm">
    <h2>Create Account</h2>
    <input type="text" placeholder="Full Name"><br>
    <input type="text" placeholder="Mobile Number" id="signupMobile"><br>
    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>
    <input type="password" placeholder="Confirm Password"><br>

    <div class="btns">
        <button class="create">Create Account</button>
        <button class="cancel" onclick="backLogin()">Cancel</button>
    </div>
</div>

<script>
var generatedOTP;
var otpEnabled = false;

// LOGIN FUNCTION
function login() {
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    if (user == "" || pass == "") {
        alert("Please enter Username and Password");
        return;
    }

    // Generate 6-digit OTP
    generatedOTP = Math.floor(100000 + Math.random() * 900000);

    // WhatsApp message
    var message = "Your SkillHub OTP is: " + generatedOTP;

    // UltraMsg API details
    var token = "1xhtdh7bylh73iay";        // replace with your UltraMsg token
    var instance = "instance164778";        // replace with your UltraMsg instance ID
    var phone = "919918841855";             // recipient phone number

    // Send OTP via UltraMsg
    fetch(`https://api.ultramsg.com/${instance}/messages/chat`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            token: token,
            to: phone,
            body: message
        })
    })
    .then(response => response.json())
    .then(data => {
        console.log("UltraMsg response:", data);
        alert("OTP sent via WhatsApp!");

        // Show OTP boxes
        document.getElementById("otpContainer").style.display = "flex";
        otpEnabled = true;

        var boxes = document.getElementsByClassName("otp-box");
        for (var i = 0; i < boxes.length; i++) {
            boxes[i].disabled = false;
            boxes[i].value = "";
        }
        boxes[0].focus();
    })
    .catch(error => {
        console.error("Error sending OTP:", error);
        alert("Failed to send OTP. Try again.");
    });
}

// MOVE BETWEEN OTP BOXES
function move(field, index, event) {
    if (!otpEnabled) return;

    var boxes = document.getElementsByClassName("otp-box");
    var key = event.key;

    // Move back on backspace
    if (key === "Backspace") {
        if (field.value.length === 0 && index > 0) {
            boxes[index - 1].focus();
        }
        return;
    }

    // Move forward on number, Enter or Tab
    if (field.value.length === 1 || key === "Enter" || key === "Tab") {
        if (index < 5) {
            boxes[index + 1].focus();
        }
    }

    // Check OTP when all boxes filled
    var entered = "";
    for (var i = 0; i < 6; i++) {
        entered += boxes[i].value;
    }

    if (entered.length === 6) {
        if (entered == generatedOTP) {
            alert("Login Successful");

            // CLEAR OTP BOXES
            for (var i = 0; i < boxes.length; i++) {
                boxes[i].value = "";
                boxes[i].disabled = true;
            }

            // HIDE OTP CONTAINER
            document.getElementById("otpContainer").style.display = "none";

            // CLEAR LOGIN FIELDS
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";

            otpEnabled = false;

            // Redirect to dashboard
            window.location = "dashboard.html";
        } else {
            alert("Wrong OTP");
            // Clear OTP boxes for retry
            for (var i = 0; i < boxes.length; i++) {
                boxes[i].value = "";
            }
            boxes[0].focus();
        }
    }
}

// OPEN SIGNUP FORM
function openSignup() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("signupForm").style.display = "block";
}

// BACK TO LOGIN
function backLogin() {
    document.getElementById("signupForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
}
</script>

</body>
</html>
