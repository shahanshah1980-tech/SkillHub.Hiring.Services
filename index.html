<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#00c6ff,#0072ff);
overflow:hidden;
position:relative;
}

body::before,
body::after{
content:"";
position:absolute;
border-radius:50%;
opacity:0.2;
}

body::before{
width:500px;
height:500px;
background:#fff;
top:-100px;
left:-100px;
}

body::after{
width:400px;
height:400px;
background:#fff;
bottom:-80px;
right:-80px;
}

.title{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:32px;
font-weight:bold;
color:#fff;
text-shadow:1px 1px 5px rgba(0,0,0,0.3);
}

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:25px;
padding:40px 30px;
width:700px;
color:#fff;
text-align:center;
margin-top:120px;
}

.form-title{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

.input-group{
position:relative;
margin:15px 0;
}

.input-group input{
width:80%;
padding:12px 40px 12px 15px;
border-radius:20px;
border:none;
outline:none;
font-size:16px;
background:rgba(255,255,255,0.2);
color:#fff;
}

.input-group i{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.btns{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
flex-wrap:wrap;
}

button{
padding:12px 30px;
border-radius:25px;
border:none;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:linear-gradient(135deg,#ff7eb3,#ff758c);
color:#fff;
}

.otp-container{
display:none;
justify-content:center;
align-items:center;
gap:10px;
margin-top:15px;
}

.otp-box{
width:40px;
height:40px;
font-size:20px;
text-align:center;
border-radius:10px;
border:1px solid #fff;
background:rgba(255,255,255,0.2);
color:#fff;
}

.error{
color:#ff7070;
font-size:14px;
}

#signupForm,
#dashboard,
#adminPanel,
#addWorkForm{
display:none;
}

.floating-label{
position:relative;
width:80%;
margin:15px auto;
}

.floating-label input{
width:100%;
padding:15px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.5);
background:rgba(255,255,255,0.2);
color:#fff;
}

.floating-label label{
position:absolute;
top:50%;
left:15px;
transform:translateY(-50%);
font-size:16px;
opacity:0.7;
}

.floating-label i{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

</style>
</head>

<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<div class="container" id="loginForm">

<h2 class="form-title">Login</h2>

<div class="input-group">
<input type="text" id="username" placeholder="Username">
<i class="fa fa-user"></i>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-eye" onclick="togglePassword('password',this)"></i>
</div>

<div class="otp-container" id="loginOtpContainer">

<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">

<button id="loginResendBtn" disabled>Resend</button>

</div>

<div class="btns">

<button onclick="login()">Login</button>
<button onclick="openSignup()">Signup</button>
<button onclick="openAdmin()">Admin</button>
<button onclick="openAddWork()">Add Work</button>

</div>

</div>

<div class="container" id="signupForm">

<h2 class="form-title">Signup</h2>

<div class="input-group">
<input type="text" id="signupName" placeholder="Full Name">
</div>

<div class="input-group">
<input type="text" id="signupMobile" placeholder="Mobile Number">
</div>

<div id="mobileError" class="error"></div>

<div class="input-group">
<input type="text" id="signupUsername" placeholder="Username">
</div>

<div id="usernameError" class="error"></div>

<div class="input-group">
<input type="password" id="signupPassword" placeholder="Password">
<i class="fa fa-eye" onclick="togglePassword('signupPassword',this)"></i>
</div>

<div class="input-group">
<input type="password" id="signupConfirmPassword" placeholder="Confirm Password">
<i class="fa fa-eye" onclick="togglePassword('signupConfirmPassword',this)"></i>
</div>

<div class="otp-container" id="signupOtpContainer">

<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">

<button id="resendBtn" disabled>Resend OTP</button>

</div>

<div class="btns">

<button onclick="signup()">Create Account</button>
<button onclick="backLogin()">Cancel</button>

</div>

</div>

<div class="container" id="dashboard">

<h2 class="form-title">Dashboard</h2>

<p id="dashboardName"></p>

<button onclick="logout()">Logout</button>

</div>

<div class="container" id="adminPanel">

<h2>Hello Admin</h2>

<button onclick="backLogin()">Back</button>

</div>

<div class="container" id="addWorkForm">

<h2 class="form-title">Add Worker</h2>

<div class="input-group">
<input type="text" id="workerName" placeholder="Full Name">
</div>

<div class="input-group">
<input type="text" id="workerName" placeholder="Full Name">
</div>

<div class="input-group">
<input type="text" id="fatherName" placeholder="Father Name">
</div>

<div class="floating-label">

<input type="text" id="dobText" placeholder=" " readonly onclick="openDOB()">

<label>Date of Birth</label>

<input type="date" id="dobPicker" style="display:none" onchange="setDOB()">

<i class="fa fa-calendar" onclick="openDOB()"></i>

</div>

<div class="input-group">
<input type="text" id="workerMobile" placeholder="Mobile Number">
</div>

<div class="input-group">
<input type="text" id="workerSkill" placeholder="Skill">
</div>

<div class="input-group">
<input type="text" id="workerLocation" placeholder="Location">
</div>

<div class="btns">

<button onclick="saveWorker()">Submit</button>

<button onclick="backLogin()">Back</button>

</div>

</div>

<script>

var token="1xhtdh7bylh73iay";
var instance="instance164778";

var signupGeneratedOTP;
var loginGeneratedOTP;
var loginUser;

function sendWhatsAppOTP(number,otp,message){

fetch("https://api.ultramsg.com/"+instance+"/messages/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

token:token,
to:number,
body:message+" "+otp

})

})

}

function openSignup(){

loginForm.style.display="none";
signupForm.style.display="block";

}

function backLogin(){

loginForm.style.display="block";
signupForm.style.display="none";
dashboard.style.display="none";
adminPanel.style.display="none";
addWorkForm.style.display="none";

}

function openAdmin(){

loginForm.style.display="none";
adminPanel.style.display="block";

}

function openAddWork(){

loginForm.style.display="none";
addWorkForm.style.display="block";

}

function signup(){

var mobile=signupMobile.value.trim();
var username=signupUsername.value.trim();

signupGeneratedOTP=Math.floor(100000+Math.random()*900000);

sendWhatsAppOTP(mobile,signupGeneratedOTP,"Your SkillHub Signup OTP is:");

signupOtpContainer.style.display="flex";

}

function login(){

var users=JSON.parse(localStorage.getItem("users"))||[];

var user=users.find(u=>u.username==username.value && u.password==password.value);

if(!user){

alert("Invalid Login");

return;

}

loginUser=user;

loginGeneratedOTP=Math.floor(100000+Math.random()*900000);

sendWhatsAppOTP(user.mobile,loginGeneratedOTP,"Your SkillHub Login OTP is:");

loginOtpContainer.style.display="flex";

}

function saveWorker(){

var workers=JSON.parse(localStorage.getItem("workers"))||[];

workers.push({

name:workerName.value,
mobile:workerMobile.value,
skill:workerSkill.value,
location:workerLocation.value,
dob:dobText.value

});

localStorage.setItem("workers",JSON.stringify(workers));

alert("Worker Added");

backLogin();

}

function togglePassword(id,icon){

var input=document.getElementById(id);

if(input.type==="password"){

input.type="text";

icon.classList.remove("fa-eye");

icon.classList.add("fa-eye-slash");

}else{

input.type="password";

icon.classList.remove("fa-eye-slash");

icon.classList.add("fa-eye");

}

}

function openDOB(){

document.getElementById("dobPicker").showPicker();

}

function setDOB(){

var d=new Date(document.getElementById("dobPicker").value);

var day=("0"+d.getDate()).slice(-2);

var month=("0"+(d.getMonth()+1)).slice(-2);

var year=d.getFullYear();

document.getElementById("dobText").value=day+"/"+month+"/"+year;

}

function logout(){

backLogin();

}

</script>

</body>
</html>
