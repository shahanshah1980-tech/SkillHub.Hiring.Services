<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<!-- =========================
        EXTERNAL LIBRARIES
========================= -->
<!-- Font Awesome for icons (user, phone, eye, gender icons) -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<!-- Flatpickr for date picker -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
/* =========================
        GLOBAL STYLES
========================= */
body{
margin:0;font-family:Arial;height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#00c6ff,#0072ff);overflow:hidden;position:relative;
}
body::before,body::after{content:"";position:absolute;border-radius:50%;opacity:0.2;}
body::before{width:500px;height:500px;background:#fff;top:-100px;left:-100px;}
body::after{width:400px;height:400px;background:#fff;bottom:-80px;right:-80px;}

/* Title/header styling */
.title{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:bold;
color:#fff;text-shadow:1px 1px 5px rgba(0,0,0,0.3);}

/* Container for forms */
.container{background:rgba(255,255,255,0.15);backdrop-filter:blur(15px);border-radius:25px;
padding:40px 30px;width:700px;color:#fff;text-align:center;margin-top:120px;}

/* Form title styling */
.form-title{font-size:24px;font-weight:bold;margin-bottom:20px;}

/* Input fields styling */
.input-group{position:relative;margin:15px 0;}
.input-group input,.input-group select{width:90%;padding:12px 40px 12px 25px;border-radius:20px;
border:none;outline:none;font-size:16px;background:#fff;color:#000;appearance:none;-webkit-appearance:none;
-moz-appearance:none;box-sizing:border-box;}
.input-group i{position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;color:#000;}

/* Buttons container */
.btns{display:flex;justify-content:center;gap:15px;margin-top:25px;flex-wrap:wrap;}
button{padding:12px 30px;border-radius:25px;border:none;cursor:pointer;font-size:16px;font-weight:bold;
background:linear-gradient(135deg,#ff7eb3,#ff758c);color:#fff;}

/* OTP box container */
.otp-container{display:none;justify-content:center;align-items:center;gap:10px;margin-top:15px;}
.otp-box{width:40px;height:40px;font-size:20px;text-align:center;border-radius:10px;border:1px solid #000;
background:#fff;color:#000;}

/* Error messages */
.error{color:#ff7070;font-size:14px;}

/* Hide forms by default */
#signupForm,#dashboard,#adminPanel,#addWorkForm{display:none;}

/* Scrollable Add Worker form */
#addWorkForm{max-height:70vh;overflow-y:auto;padding-right:10px;margin-top:80px;}
#addWorkForm::-webkit-scrollbar{width:8px;}
#addWorkForm::-webkit-scrollbar-thumb{background: rgba(255,255,255,0.4);border-radius:4px;}
#addWorkForm::-webkit-scrollbar-track{background: transparent;}

/* Gender icons styling */

.input-group.radio-group {
  display: flex;
  gap: 30px; /* space between each option */
  align-items: center;
  justify-content: center;
  margin: 15px 0;
}

.input-group.radio-group label {
  display: flex;
  align-items: center;
  gap: 8px;      /* space between radio button and icon */
  cursor: pointer;
}

/* Standard round radio button */
.input-group.radio-group input[type="radio"] {
  width: 20px;
  height: 20px;
  border-radius: 50%;  /* round shape */
  border: 2px solid #000; /* black border */
  appearance: none;       /* remove default styling */
  cursor: pointer;
  position: relative;
  background-color: #fff; /* white background */
}

/* Black dot when selected */
.input-group.radio-group input[type="radio"]:checked::after {
  content: "";
  width: 12px;
  height: 12px;
  background-color: #000; /* black dot */
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Icon next to the radio button */
.input-group.radio-group i {
  font-size: 24px; /* icon size */
  color: #000;     /* always black */
}

</style>
</head>

<body>

<!-- =========================
        HEADER
========================= -->
<h1 class="title">SkillHub & Hiring Services</h1>

<!-- =========================
        LOGIN FORM
========================= -->
<div class="container" id="loginForm">
<h2 class="form-title">Login</h2>
<div class="input-group">
<input type="text" id="login_username" placeholder="Username">
<i class="fa fa-user"></i>
</div>
<div class="input-group">
<input type="password" id="login_password" placeholder="Password">
<i class="fa fa-eye" onclick="app_togglePassword('login_password',this)"></i>
</div>
<!-- OTP for login (hidden by default) -->
<div class="otp-container" id="loginOtpContainer">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<button id="loginResendBtn" disabled>Resend</button>
</div>
<!-- Login form buttons -->
<div class="btns">
<button onclick="login_start()">Login</button>
<button onclick="openSignup()">Signup</button>
<button onclick="openAdmin()">Admin</button>
<button onclick="openAddWork()">Add Worker</button>
</div>
</div>

<!-- =========================
        SIGNUP FORM
========================= -->
<div class="container" id="signupForm">
<h2 class="form-title">Signup</h2>
<div class="input-group">
<input type="text" id="signupName" placeholder="Full Name">
<i class="fa fa-user"></i>
</div>
<div class="input-group">
<input type="text" id="signupMobile" placeholder="Mobile Number">
<i class="fa fa-phone"></i>
</div>
<div id="mobileError" class="error"></div>
<div class="input-group">
<input type="text" id="signupUsername" placeholder="Username">
<i class="fa fa-user"></i>
</div>
<div id="usernameError" class="error"></div>
<div class="input-group">
<input type="password" id="signup_password" placeholder="Password">
<i class="fa fa-eye" onclick="app_togglePassword('signup_password',this)"></i>
</div>
<div class="input-group">
<input type="password" id="signup_confirmPassword" placeholder="Confirm Password">
<i class="fa fa-eye" onclick="app_togglePassword('signup_confirmPassword',this)"></i>
</div>
<!-- OTP container for signup -->
<div class="otp-container" id="signupOtpContainer">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<button id="resendBtn" disabled>Resend OTP</button>
</div>
<div class="btns">
<button onclick="signup_start()">Create Account</button>
<button onclick="backLogin()">Cancel</button>
</div>
</div>

<!-- =========================
        DASHBOARD
========================= -->
<div class="container" id="dashboard">
<h2 class="form-title">Dashboard</h2>
<p id="dashboardName"></p>
<button onclick="logout()">Logout</button>
</div>

<!-- =========================
        ADMIN PANEL
========================= -->
<div class="container" id="adminPanel">
<h2>Hello Admin</h2>
<button onclick="backLogin()">Back</button>
</div>

<!-- =========================
        ADD WORKER FORM
========================= -->
<div class="container" id="addWorkForm">
<h2 class="form-title">Add Worker</h2>

<!-- Worker personal details -->
<div class="input-group">
<input type="text" id="worker_name" placeholder="Full Name">
<i class="fa fa-user"></i>        
</div>
<div class="input-group">
<input type="text" id="worker_father" placeholder="Father Name">
<i class="fa fa-user"></i>        
</div>
<div class="input-group">
<input type="text" id="worker_dob" placeholder="Date of Birth">
<i class="fa fa-calendar"></i>
</div>

<div class="input-group radio-group">
  <label>
    <input type="radio" name="worker_gender" value="male">
    <i class="fa-solid fa-mars"></i>
  </label>

  <label>
    <input type="radio" name="worker_gender" value="female">
    <i class="fa-solid fa-venus"></i>
  </label>

  <label>
    <input type="radio" name="worker_gender" value="other">
    <i class="fa-solid fa-genderless"></i>
  </label>
</div>


<!-- Contact details -->
<div class="input-group">
<input type="text" id="worker_mobile" placeholder="Mobile Number">
<i class="fa fa-phone"></i>        
</div>
<div class="input-group">
<input type="text" id="worker_address" placeholder="Address">
<i class="fa fa-home"></i>
</div>

<!-- Skill selection dropdowns -->
<select id="main_type" class="small-dropdown" required>
<option value="" disabled selected>Select Any One</option>
<option value="workers">Workers</option>
<option value="ride">Ride Type</option>
</select>
<select id="service_type2" class="small-dropdown">
<option value="">Select Skill 2</option>
<option value="plumber">Plumber</option>
<option value="electrician">Electrician</option>
<option value="mason">Mason</option>
</select>
<select id="service_type3" class="small-dropdown">
<option value="">Select Skill 3</option>
<option value="plumber">Plumber</option>
<option value="electrician">Electrician</option>
<option value="mason">Mason</option>
</select>

<!-- Buttons for worker form -->
<div class="btns">
<button onclick="worker_save()">Submit Worker</button>
<button onclick="backLogin()">Back</button>
<button onclick="sendWorkerOTP()">Send OTP via WhatsApp</button>
<button onclick="sendWhatsAppWorker()">Send Message via Web</button>
</div>
</div>

<script>
/* =========================
        FLATPICKR - DOB DATE PICKER
========================= */
flatpickr("#worker_dob",{dateFormat:"d/m/Y",allowInput:false,monthSelectorType:"dropdown",
yearSelectorType:"dropdown",defaultDate:"2000-01-01",position:"auto right"});

/* =========================
        PASSWORD VISIBILITY TOGGLE
========================= */
function app_togglePassword(id,icon){
var input=document.getElementById(id);
if(input.type==="password"){input.type="text";icon.classList.remove("fa-eye");icon.classList.add("fa-eye-slash");}
else{input.type="password";icon.classList.remove("fa-eye-slash");icon.classList.add("fa-eye");}
}

/* =========================
        NAVIGATION FUNCTIONS
========================= */
function backLogin(){resetSignupForm();loginForm.style.display="block";signupForm.style.display="none";
dashboard.style.display="none";adminPanel.style.display="none";addWorkForm.style.display="none";}
function resetSignupForm(){document.getElementById("signupName").value="";
document.getElementById("signupMobile").value="";document.getElementById("signupUsername").value="";
document.getElementById("signup_password").value="";document.getElementById("signup_confirmPassword").value="";
document.getElementById("signupOtpContainer").style.display="none";document.getElementById("mobileError").innerText="";
document.getElementById("usernameError").innerText="";}

/* =========================
        SAVE WORKER TO LOCAL STORAGE
========================= */
function worker_save(){
var workers=JSON.parse(localStorage.getItem("workers"))||[];
workers.push({
name:worker_name.value,
mobile:worker_mobile.value,
skill:[document.getElementById("service_type1")?.value,
document.getElementById("service_type2")?.value,
document.getElementById("service_type3")?.value],
location:worker_address?.value,
dob:worker_dob.value,
gender: document.querySelector('input[name="worker_gender"]:checked')?.value || ''
});
localStorage.setItem("workers",JSON.stringify(workers));
alert("Worker Added");backLogin();
}

/* =========================
        SEND OTP VIA ULTRAMSG API
========================= */
var token="1xhtdh7bylh73iay";
var instance="instance164778";
function generateOTP(){return Math.floor(100000+Math.random()*900000);}
function sendWorkerOTP(){
var number=worker_mobile.value.trim();
if(!number){alert("Enter mobile number first!"); return;}
var otp=generateOTP();
localStorage.setItem("lastWorkerOTP",otp);
var message="Your SkillHub OTP is: "+otp;
fetch("https://api.ultramsg.com/"+instance+"/messages/chat",{
method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({token:token,to:number,body:message})
}).then(res=>res.json()).then(data=>{console.log("OTP sent:",data);alert("OTP sent via WhatsApp!");})
.catch(err=>{console.error(err);alert("Failed to send OTP!");});
}

/* =========================
        SEND WHATSAPP MESSAGE MANUALLY
========================= */
function sendWhatsAppWorker(){
var number=worker_mobile.value.trim();
var gender=document.querySelector('input[name="worker_gender"]:checked')?.value||''; 
var name=worker_name.value;
if(!number || !name || !gender){alert("Please fill name, mobile and select gender first!"); return;}
var msg=`Hello ${name}, Gender: ${gender}, Your registration is complete.`;
var url=`https://wa.me/${number}?text=${encodeURIComponent(msg)}`;
window.open(url,"_blank");
}

/* =========================
        FORM NAVIGATION
========================= */
function openAddWork(){loginForm.style.display="none";addWorkForm.style.display="block";worker_dob.value="";worker_dob.placeholder="Date of Birth";}
function openSignup(){loginForm.style.display="none";signupForm.style.display="block";}
function openAdmin(){loginForm.style.display="none";adminPanel.style.display="block";}
function logout(){backLogin();}

/* =========================
        PLACEHOLDER LOGIN / SIGNUP LOGIC
========================= */
function login_start(){alert("Login logic goes here");}
function signup_start(){alert("Signup logic goes here");}

</script>
</body>
</html>
