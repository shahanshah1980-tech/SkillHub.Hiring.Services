<!DOCTYPE html>
<html>
<head>
<title>Add Worker</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* CONTAINER */
.worker-container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:25px;
    width:550px;
    text-align:center;
    color:#fff;
}

/* INPUT GROUP */
.input-group{
    position:relative;
    margin:12px 0;
}

.input-group input{
    width:100%;
    padding:12px 40px 12px 15px;
    border:none;
    border-radius:20px;
    outline:none;
}

/* ICON */
.input-group i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    color:#888;
}

/* ROW GROUP */
.row-group{
    display:flex;
    gap:10px;
    margin-top:10px;
}

/* DEFAULT (2 FIELD MODE) */
.row-group select{
    flex:1;
}

/* TYPE FIX WIDTH */
#worker_type{
    flex:0.8;
}

/* HIDE BY DEFAULT */
#worker_skill{
    display:none;
}
#vehicle_no{
    display:none;
}

/* WHEN 3 FIELD */
.row-group.three #worker_type{
    flex:0.7;
}
.row-group.three #worker_skill{
    flex:1;
}
.row-group.three #vehicle_no{
    flex:1;
    display:block;
}

/* COMMON FIELD STYLE */
.row-group select,
.row-group input{
    padding:12px;
    border:none;
    border-radius:20px;
    outline:none;
    font-size:14px;
}

/* SELECT COLOR */
select{
    color:gray;
}
select.active{
    color:black;
}

/* GENDER */
.gender-box{
    display:flex;
    justify-content:space-around;
    margin:15px 0;
}

.gender-option{
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
}

.gender-option input{
    display:none;
}

.radio-circle{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#fff;
    border:2px solid #ccc;
    position:relative;
}

.gender-option input:checked + .radio-circle::after{
    content:"";
    width:10px;
    height:10px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* BUTTONS */
.button-group{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

button{
    padding:10px 25px;
    border:none;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(135deg,#ff7eb3,#ff758c);
    color:#fff;
}
</style>
</head>

<body>

<div class="worker-container">
    <h2>Add Worker</h2>

    <div class="input-group">
        <input type="text" id="worker_name" placeholder="Full Name">
        <i class="fa fa-user"></i>
    </div>

    <div class="input-group">
        <input type="text" id="worker_mobile" placeholder="Mobile Number">
        <i class="fa fa-phone"></i>
    </div>

    <!-- GENDER -->
    <div class="gender-box">
        <label class="gender-option">
            <input type="radio" name="gender" value="male">
            <span class="radio-circle"></span> Male
        </label>

        <label class="gender-option">
            <input type="radio" name="gender" value="female">
            <span class="radio-circle"></span> Female
        </label>

        <label class="gender-option">
            <input type="radio" name="gender" value="other">
            <span class="radio-circle"></span> Other
        </label>
    </div>

    <!-- ROW GROUP -->
    <div class="row-group" id="rowGroup">

        <select id="worker_type" onchange="toggleFields(); updateSelectColor(this)">
            <option value="" disabled selected>Select Type</option>
            <option value="worker">Worker</option>
            <option value="vehicle">Vehicle</option>
        </select>

        <select id="worker_skill" onchange="updateSelectColor(this)">
            <option value="" disabled selected>Select Skill</option>
        </select>

        <input type="text" id="vehicle_no" placeholder="Vehicle No">

    </div>

    <!-- BUTTONS -->
    <div class="button-group">
        <button onclick="saveWorker()">Submit</button>
        <button onclick="resetForm()">Reset</button>
    </div>
</div>

<script>

/* COLOR CHANGE */
function updateSelectColor(el){
    if(el.value === ""){
        el.classList.remove("active");
    } else {
        el.classList.add("active");
    }
}

/* TOGGLE */
function toggleFields(){
    let type = document.getElementById("worker_type").value;
    let skill = document.getElementById("worker_skill");
    let vehicle = document.getElementById("vehicle_no");
    let row = document.getElementById("rowGroup");

    skill.innerHTML = "<option value='' disabled selected>Select Skill</option>";

    if(type === "worker"){
        row.classList.remove("three");

        skill.style.display = "block";
        vehicle.style.display = "none";

        ["Labour","Helper","Mason","Electrician"].forEach(i=>{
            skill.add(new Option(i,i));
        });
    }
    else if(type === "vehicle"){
        row.classList.add("three");

        skill.style.display = "block";
        vehicle.style.display = "block";

        ["Bike","Car","Truck"].forEach(i=>{
            skill.add(new Option(i,i));
        });
    }
    else{
        row.classList.remove("three");

        skill.style.display = "none";
        vehicle.style.display = "none";
    }
}

/* SAVE */
function saveWorker(){
    let name = document.getElementById("worker_name").value;
    let mobile = document.getElementById("worker_mobile").value;
    let gender = document.querySelector('input[name="gender"]:checked');
    let type = document.getElementById("worker_type").value;

    if(!name || !mobile || !gender || !type){
        alert("Please fill all required fields");
        return;
    }

    let workers = JSON.parse(localStorage.getItem("workers")) || [];

    workers.push({
        name,
        mobile,
        gender: gender.value,
        type
    });

    localStorage.setItem("workers", JSON.stringify(workers));

    alert("Worker Saved Successfully");
}

/* RESET */
function resetForm(){
    location.reload();
}

</script>

</body>
</html>
