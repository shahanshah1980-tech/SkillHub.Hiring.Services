<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    overflow:auto;
    padding-top:120px;
}
.title{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    color:#fff;
    font-weight:bold;
}
.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px 20px;
    width:700px;
    color:#fff;
    text-align:center;
    margin-bottom:50px;
}
.form-title{font-size:22px; font-weight:bold; margin-bottom:20px;}
.input-group{position:relative; margin:12px 0;}
.input-group input, .input-group select{
    width:90%;
    padding:12px 35px;
    border-radius:20px;
    border:none;
    outline:none;
    font-size:16px;
    background:#fff;
    color:#000;
}
.input-group i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}
.btns{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:15px;
    flex-wrap:wrap;
}
button{
    padding:10px 25px;
    border-radius:25px;
    border:none;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
    background:linear-gradient(135deg,#ff7eb3,#ff758c);
    color:#fff;
}
#signupForm, #dashboard, #adminPanel, #addWorkForm{display:none;}
#addWorkForm{max-height:70vh; overflow-y:auto;}

.input-group.radio-group{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:93%;
    margin:20px auto;
}
.gender-option{display:flex; align-items:center; gap:10px; cursor:pointer;}
.gender-option input{display:none;}
.radio-circle{
    width:26px;
    height:26px;
    border-radius:50%;
    background:#fff;
    border:3px solid #e0e0e0;
    position:relative;
}
.gender-option input:checked + .radio-circle::after{
    content:"";
    width:12px;
    height:12px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* DROPDOWN FIX */
.dropdown-row {
    display:flex;
    gap:10px;
    width:95%;
    margin:10px auto;
}
#main_type {
    flex: 0 0 150px;  /* yahan 150px ki jagah apni marzi se width de sakte ho */
}
.dropdown-row select {
    border: none;
    outline: none;
    box-shadow: none;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    
    padding: 12px;
    border-radius: 20px;
    font-size: 16px;
    background: #fff;
    color: #888;
    width: 100%;
    box-sizing: border-box;
    cursor: pointer;
}

.dropdown-row select option {
    color: #000;
}

.dropdown-row select option[value=""] {
    color: #888;
}

.dropdown-row select::-ms-expand { display: block; }

#vehicle_number {
    border: none;
    outline: none;
    box-shadow: none;
    border-radius: 20px;
    padding: 12px;
    font-size: 16px;
    background: #fff;
    color: #888;
    width: 100%;
    box-sizing: border-box;
    cursor: text;
}
</style>
</head>
<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN -->
<div class="container" id="loginForm">
    <h2 class="form-title">Login</h2>
    <div class="input-group">
        <input type="text" id="login_username" placeholder="Username">
    </div>
    <div class="input-group">
        <input type="password" id="login_password" placeholder="Password">
        <i class="fa fa-eye" onclick="app_togglePassword('login_password',this)"></i>
    </div>
    <div class="btns">
        <button onclick="openSignup()">Signup</button>
        <button onclick="openAddWork()">Add Worker</button>
    </div>
</div>

<!-- ADD WORKER -->
<div class="container" id="addWorkForm">
    <h2 class="form-title">Add Worker</h2>

    <div class="input-group"><input type="text" id="worker_name" placeholder="Full Name"></div>
    <div class="input-group"><input type="text" id="worker_dob"></div>

    <!-- GENDER -->
    <div class="input-group radio-group">
        <label class="gender-option">
            <input type="radio" name="worker_gender" value="male">
            <span class="radio-circle"></span> Male
        </label>
        <label class="gender-option">
            <input type="radio" name="worker_gender" value="female">
            <span class="radio-circle"></span> Female
        </label>
        <label class="gender-option">
            <input type="radio" name="worker_gender" value="other">
            <span class="radio-circle"></span> Other
        </label>
    </div>

    <div class="input-group"><input type="text" id="worker_mobile" placeholder="Mobile"></div>

    <div class="dropdown-row">
        <select id="main_type" onchange="toggleWorkerFields()">
            <option value="">Select Any One</option>
            <option value="workers">Workers</option>
            <option value="vehicle">Vehicle</option>
        </select>

        <select id="service_type1" style="visibility:hidden"></select>
        <input type="text" id="vehicle_number" placeholder="Vehicle No" style="visibility:hidden">
    </div>

    <div class="btns">
        <button onclick="sendWorkerOTP()">Send OTP</button>
        <button onclick="worker_save()">Submit</button>
        <button onclick="backLogin()">Back</button>
    </div>
</div>

<script>
/* ULTRAMSG */
var token="1xhtdh7bylh73iay";
var instance="instance164778";

/* PASSWORD */
function app_togglePassword(id,icon){
    var input=document.getElementById(id);
    input.type = input.type==="password" ? "text" : "password";
}

/* DROPDOWN */
function toggleWorkerFields(){
    var main=document.getElementById("main_type");
    var skill=document.getElementById("service_type1");
    var vehicle=document.getElementById("vehicle_number");

    skill.innerHTML="";

    if(main.value==="workers"){
        skill.style.visibility="visible";
        vehicle.style.visibility="hidden";

        var list=["Labour","Helper","Mason","Electrician"];
        skill.innerHTML="<option value=''>Select Any One</option>";
        list.forEach(i=>{
            var opt=document.createElement("option");
            opt.value=i;
            opt.text=i;
            skill.appendChild(opt);
        });
    }
    else if(main.value==="vehicle"){
        skill.style.visibility="visible";
        vehicle.style.visibility="visible";

        var list=["Bike","Car","Truck"];
        skill.innerHTML="<option value=''>Select Vehicle</option>";
        list.forEach(i=>{
            var opt=document.createElement("option");
            opt.value=i;
            opt.text=i;
            skill.appendChild(opt);
        });
    }
    else{
        skill.style.visibility="hidden";
        vehicle.style.visibility="hidden";
    }

    skill.style.color="#888";
}

/* COLOR CHANGE */
document.addEventListener("change",function(e){
    if(e.target.tagName==="SELECT"){
        e.target.style.color = e.target.value==="" ? "#888" : "#000";
    }
});

/* DATE */
flatpickr("#worker_dob",{dateFormat:"d/m/Y"});

/* OTP */
function sendWorkerOTP(){
    var num=document.getElementById("worker_mobile").value;
    if(!num){alert("Enter Mobile");return;}

    var otp=Math.floor(100000+Math.random()*900000);
    fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({token:token,to:num,body:"OTP: "+otp})
    });

    alert("OTP Sent");
}

/* SAVE */
function worker_save(){
    var name=document.getElementById("worker_name").value;
    var mobile=document.getElementById("worker_mobile").value;
    var gender=document.querySelector('input[name="worker_gender"]:checked');

    if(!name||!mobile||!gender){
        alert("Fill all fields");
        return;
    }

    var list=JSON.parse(localStorage.getItem("workers"))||[];
    list.push({name,mobile,gender:gender.value});
    localStorage.setItem("workers",JSON.stringify(list));

    alert("Saved");
    location.reload();
}

/* NAV */
function openSignup(){}
function openAddWork(){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("addWorkForm").style.display="block";
}
function backLogin(){
    location.reload();
}
</script>

</body>
</html>
