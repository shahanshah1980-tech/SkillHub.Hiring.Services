<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin-top:80px;
}

.container{
background:white;
width:360px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input[type=text],input[type=password]{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
background:#0078d7;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
}

/* OTP boxes container */

.otp-container{
display:flex;
justify-content:center;
gap:6px;
margin-top:10px;
}

/* OTP box */

.otp-box{
width:40px;
height:40px;
font-size:20px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>SkillHub Login</h2>

<input type="text" id="username" placeholder="Username"><br>

<input type="password" id="password" placeholder="Password"><br>

<div class="otp-container">

<input class="otp-box" maxlength="1" disabled onkeyup="move(this,0)">
<input class="otp-box" maxlength="1" disabled onkeyup="move(this,1)">
<input class="otp-box" maxlength="1" disabled onkeyup="move(this,2)">
<input class="otp-box" maxlength="1" disabled onkeyup="move(this,3)">
<input class="otp-box" maxlength="1" disabled onkeyup="move(this,4)">
<input class="otp-box" maxlength="1" disabled onkeyup="move(this,5)">

</div>

<button onclick="login()">Login</button>

</div>

<script>

var generatedOTP;
var otpEnabled=false;

function login(){

var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

if(user=="" || pass==""){

alert("Please enter Username and Password");
return;

}

generatedOTP=Math.floor(100000 + Math.random()*900000);

alert("WhatsApp OTP: "+generatedOTP);

otpEnabled=true;

var boxes=document.getElementsByClassName("otp-box");

for(var i=0;i<boxes.length;i++){

boxes[i].disabled=false;

}

boxes[0].focus();

}

function move(field,index){

if(!otpEnabled) return;

var boxes=document.getElementsByClassName("otp-box");

if(field.value.length==1 && index<5){

boxes[index+1].focus();

}

var entered="";

for(var i=0;i<6;i++){

entered+=boxes[i].value;

}

if(entered.length==6){

if(entered==generatedOTP){

window.location="dashboard.html";

}
else{

alert("Wrong OTP");

}

}

}

</script>

</body>
</html>
