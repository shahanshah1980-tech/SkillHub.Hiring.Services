<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    padding-top:120px;
}

.title{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    color:#fff;
    font-weight:bold;
}

.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px 20px;
    width:700px;
    color:#fff;
    text-align:center;
    margin-bottom:50px;
}

.form-title{font-size:22px; font-weight:bold;}

.input-group{position:relative; margin:12px 0;}

.input-group input, .input-group select{
    width:90%;
    padding:12px 35px;
    border-radius:20px;
    border:none;
    font-size:16px;
    background:#fff;
    color:#000;
}

.input-group i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#000;
}

button{
    padding:10px 25px;
    border-radius:25px;
    border:none;
    cursor:pointer;
    font-weight:bold;
    background:linear-gradient(135deg,#ff7eb3,#ff758c);
    color:#fff;
}

.btns{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

#service_type1, #vehicle_number{
    display:none;
}

.dropdown-row{
    display:flex;
    gap:10px;
    width:95%;
    margin:auto;
}
</style>
</head>

<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN -->
<div class="container" id="loginForm">
    <h2>Login</h2>
    <div class="input-group">
        <input id="login_username" placeholder="Username">
        <i class="fa fa-user"></i>
    </div>
    <div class="input-group">
        <input type="password" id="login_password" placeholder="Password">
        <i class="fa fa-eye" onclick="togglePass('login_password',this)"></i>
    </div>
    <div class="btns">
        <button onclick="openSignup()">Signup</button>
        <button onclick="openAddWork()">Add Worker</button>
    </div>
</div>

<!-- SIGNUP -->
<div class="container" id="signupForm" style="display:none;">
    <h2>Signup</h2>
    <input id="signupName" placeholder="Name"><br><br>
    <input id="signupMobile" placeholder="Mobile"><br><br>
    <input id="signupUsername" placeholder="Username"><br><br>
    <input type="password" id="signup_password" placeholder="Password"><br><br>
    <button onclick="backLogin()">Back</button>
</div>

<!-- ADD WORKER -->
<div class="container" id="addWorkForm" style="display:none;">
    <h2>Add Worker</h2>

    <input id="worker_name" placeholder="Name"><br><br>
    <input id="worker_mobile" placeholder="Mobile"><br><br>

    <div class="dropdown-row">
        <select id="main_type" onchange="toggleWorkerFields()">
            <option value="">Select Type</option>
            <option value="workers">Workers</option>
            <option value="vehicle">Vehicle</option>
        </select>

        <select id="service_type1"></select>

        <input id="vehicle_number" placeholder="Vehicle No">
    </div>

    <br>
    <button onclick="worker_save()">Save</button>
    <button onclick="backLogin()">Back</button>
</div>

<script>

function togglePass(id,icon){
    let x=document.getElementById(id);
    if(x.type==="password"){x.type="text";}
    else{x.type="password";}
}

function hideAll(){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("signupForm").style.display="none";
    document.getElementById("addWorkForm").style.display="none";
}

function openSignup(){hideAll();signupForm.style.display="block";}
function openAddWork(){hideAll();addWorkForm.style.display="block";}
function backLogin(){hideAll();loginForm.style.display="block";}

function toggleWorkerFields(){
    let type=document.getElementById("main_type").value;
    let drop=document.getElementById("service_type1");
    let vehicle=document.getElementById("vehicle_number");

    drop.innerHTML="";

    if(type==="workers"){
        drop.style.display="block";
        vehicle.style.display="none";

        let workers=["Electrician","Plumber","Driver","Carpenter"];
        drop.innerHTML="<option>Select</option>";

        workers.forEach(w=>{
            let o=document.createElement("option");
            o.text=w;
            drop.add(o);
        });
    }
    else if(type==="vehicle"){
        drop.style.display="block";
        vehicle.style.display="block";

        let v=["Bike","Car","Truck"];
        drop.innerHTML="<option>Select</option>";

        v.forEach(x=>{
            let o=document.createElement("option");
            o.text=x;
            drop.add(o);
        });
    }
    else{
        drop.style.display="none";
        vehicle.style.display="none";
    }
}

function worker_save(){
    let name=document.getElementById("worker_name").value;
    let mobile=document.getElementById("worker_mobile").value;

    if(!name||!mobile){
        alert("Fill all fields");
        return;
    }

    let data={
        name:name,
        mobile:mobile,
        type:document.getElementById("main_type").value,
        skill:document.getElementById("service_type1").value,
        vehicle:document.getElementById("vehicle_number").value
    };

    let list=JSON.parse(localStorage.getItem("workers"))||[];
    list.push(data);
    localStorage.setItem("workers",JSON.stringify(list));

    alert("Saved Successfully");
}

window.onload=toggleWorkerFields;

</script>

</body>
</html>
