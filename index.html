<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillHub & Hiring Services</title>

<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: white;
    overflow: hidden;
}
.container {
    width: 700px;
    height: 70vh;
    overflow-y: auto;
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
}
h2 { text-align:center; }
input, select {
    width: 95%;
    height: 45px;
    margin: 10px 0;
    border-radius: 50px;
    border: none;
    padding: 0 15px;
}
.gender-box { display:flex; gap:20px; }
button {
    padding:10px 20px;
    border:none;
    border-radius:50px;
    background:#ff758c;
    color:white;
    cursor:pointer;
}
button.file-btn { background:#6c757d !important; }

.upload-row {
    display:flex;
    align-items:center;
    gap:15px;
    font-size:24px;
    font-weight:bold;
}
#fileName { font-size:14px; max-width:200px; overflow:hidden; }

.service-row { display:flex; gap:5px; align-items:center; }
.vehicle-box input { width:85%; }

.doc-box {
    background: rgba(255,255,255,0.15);
    padding: 15px;
    border-radius: 15px;
}
.doc-item {
    display:flex;
    justify-content:space-between;
    background: rgba(0,0,0,0.2);
    padding:2px 10px;
    margin:3px 0;
    border-radius:25px;
}
.selected-text { font-size:12px; }

#cv { display:none; }
</style>
</head>

<body>

<h1 style="text-align:center;">SkillHub & Hiring Services</h1>

<div class="container">
<form id="myForm">

<h2>Worker Registration</h2>

<h3>Personal Details</h3>
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="dob" placeholder="Date of Birth">

<div class="gender-box">
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Other"> Other</label>
</div>

<h3>Contact Details</h3>
<input type="text" id="mobile" maxlength="10" placeholder="Mobile Number"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">
<input type="email" id="email" placeholder="Email">
<input type="text" id="address" placeholder="Address">

<h3>Service Details</h3>
<div class="service-row">
<select id="type" onchange="loadOptions()">
<option value="">Select Type</option>
<option value="worker">Worker</option>
<option value="vehicle">Vehicle</option>
</select>

<select id="subtype"></select>

<div id="vehicleBox" style="display:none;">
<input type="text" placeholder="Vehicle Number">
</div>
</div>

<h3>Documents</h3>
<div class="doc-box">
<label class="doc-item"><span>Aadhar</span><input type="checkbox"><span class="selected-text"></span></label>
<label class="doc-item"><span>Passport</span><input type="checkbox"><span class="selected-text"></span></label>
<label class="doc-item"><span>Driving License</span><input type="checkbox"><span class="selected-text"></span></label>
<label class="doc-item"><span>Photo</span><input type="checkbox"><span class="selected-text"></span></label>
</div>

<h3 class="upload-row">
Upload CV
<button type="button" id="fileBtn" class="file-btn" onclick="handleFile()">Choose File</button>
<span id="fileName"></span>
</h3>

<input type="file" id="cv" onchange="updateButton()">

<br><br>
<button type="button" onclick="save()">Submit</button>
<button type="button" onclick="resetForm()">Reset</button>

</form>
</div>

<script>

// DATE PICKER
$("#dob").datepicker({
    changeMonth:true,
    changeYear:true,
    yearRange:"1900:2025",
    dateFormat:"dd/mm/yy",
    onSelect:function(){
        document.getElementById("mobile").focus();
    }
});

// DOC SELECT TEXT
document.querySelectorAll(".doc-item input").forEach(cb=>{
    cb.addEventListener("change",function(){
        let t=this.parentElement.querySelector(".selected-text");
        t.innerText=this.checked?"(Selected)":"";
    });
});

// SERVICE OPTIONS
function loadOptions(){
    let type=document.getElementById("type").value;
    let sub=document.getElementById("subtype");
    let box=document.getElementById("vehicleBox");

    sub.innerHTML="<option>Select Option</option>";

    let w=["Labour","Helper","Mason","Carpenter","Electrician"];
    let v=["Bike","Car","Truck","Bus"];

    if(type==="worker"){
        box.style.display="none";
        w.forEach(i=>sub.add(new Option(i,i)));
    } else {
        box.style.display="block";
        v.forEach(i=>sub.add(new Option(i,i)));
    }
}

// FILE
function updateButton(){
    let f=cv.files[0];
    if(f){
        fileBtn.innerText="View File";
        fileName.innerText=f.name;
    }
}
function handleFile(){
    if(!cv.files.length) cv.click();
    else window.open(URL.createObjectURL(cv.files[0]));
}

// SAVE FUNCTION (MAIN FIX)
function save(){

    let name = document.getElementById("name").value.trim();
    let father = document.getElementById("father").value.trim();
    let dob = document.getElementById("dob").value;
    let gender = document.querySelector('input[name="gender"]:checked');
    let mobile = document.getElementById("mobile").value.trim();
    let email = document.getElementById("email").value.trim();
    let address = document.getElementById("address").value.trim();

    if(!name || !father || !dob || !gender || !mobile){
        alert("Fill all required fields");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let userData = {
        name: name,
        father: father,
        dob: dob,
        gender: gender.value,
        mobile: mobile,
        email: email,
        address: address,
        username: mobile,
        password: mobile
    };

    users.push(userData);

    localStorage.setItem("users", JSON.stringify(users));

    alert("Saved Successfully");
}

// RESET
function resetForm(){
    document.getElementById("myForm").reset();
}

// ENTER NEXT
document.addEventListener("keydown",function(e){
if(e.key==="Enter"){
e.preventDefault();
let f=[...document.querySelectorAll("input,select,button")].filter(el=>el.offsetParent!==null);
let i=f.indexOf(document.activeElement);
if(i>-1&&i<f.length-1)f[i+1].focus();
}});
</script>

</body>
</html>
