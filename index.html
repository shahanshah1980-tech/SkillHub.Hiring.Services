
<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<style>

body{
font-family:Arial;
background:#eaf6ff;
text-align:center;
margin-top:60px;
}

.title{
font-size:32px;
font-weight:bold;
color:#0078d7;
margin-bottom:30px;
}

.container{
background:white;
width:420px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

.error{
color:red;
font-size:14px;
text-align:left;
width:90%;
margin:auto;
}

.btns{
display:flex;
justify-content:center;
gap:15px;
margin-top:30px;
}

button{
padding:10px 30px;
font-size:16px;
background:skyblue;
color:black;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#87cefa;
}

/* OTP DESIGN */

.otp-container{
display:none;
justify-content:center;
align-items:center;
margin-top:15px;
flex-wrap:wrap;
}

.otp-container{
display:none;
justify-content:center; /* center OTP boxes */
align-items:center;
margin-top:15px;
}

.otp-box{
width:30px;          /* square size */
height:30px;
font-size:20px;      /* readable */
text-align:center;
border:1px solid black; /* simple black border */
border-radius:0px;    /* slight rounding */
outline:none;
padding:0;
margin:0 0px;        /* small gap between boxes */
background:#fff;      /* white background */
box-shadow:none;      /* no shadow */
transition:none;      /* no animation */
}

.otp-box:focus{
border-color:black;   /* keep black border on focus */
background:#fff;      /* stay white */
box-shadow:none;      /* no glow */
}

.otp-container button{
height:30px;
padding:0 0px;
font-size:14px;
margin-left:0px;
}

</style>
</head>

<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN FORM -->

<div class="container" id="loginForm">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<div class="otp-container" id="loginOtpContainer">

<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">

<div class="timer" id="loginOtpTimer">30 sec</div>

<button class="resend" id="loginResendBtn" onclick="resendLoginOTP()" disabled>Resend OTP</button>

</div>

<div class="btns">
<button onclick="login()">Login</button>
<button onclick="openSignup()">Signup</button>
</div>

</div>


<!-- SIGNUP FORM -->

<div class="container" id="signupForm" style="display:none;">

<h2>Create Account</h2>

<input type="text" id="signupName" placeholder="Full Name">

<input type="text" id="signupMobile" placeholder="Mobile Number">
<div id="mobileError" class="error"></div>

<input type="text" id="signupUsername" placeholder="Username">
<div id="usernameError" class="error"></div>

<input type="password" id="signupPassword" placeholder="Password">

<input type="password" id="signupConfirmPassword" placeholder="Confirm Password">

<div class="otp-container" id="signupOtpContainer">

<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">

<div class="timer" id="otpTimer">30 sec</div>

<button class="resend" id="resendBtn" onclick="resendOTP()" disabled>Resend OTP</button>

</div>

<div class="btns">
<button onclick="signup()">Create Account</button>
<button onclick="backLogin()">Cancel</button>
</div>

</div>


<script>

/* UltraMsg API */

var token="1xhtdh7bylh73iay";
var instance="instance164778";

/* VARIABLES */

var signupGeneratedOTP;
var loginGeneratedOTP;
var loginUser;

var timerInterval;
var loginTimer;


/* SEND WHATSAPP */

function sendWhatsAppOTP(number,otp,message){

fetch("https://api.ultramsg.com/"+instance+"/messages/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

token:token,
to:number,
body:message+" "+otp

})

})

}


/* SIGNUP */

function signup(){

var mobile=document.getElementById("signupMobile").value.trim();
var username=document.getElementById("signupUsername").value.trim();
var pass=document.getElementById("signupPassword").value;
var confirm=document.getElementById("signupConfirmPassword").value;

document.getElementById("mobileError").innerHTML="";
document.getElementById("usernameError").innerHTML="";

if(pass!=confirm){

alert("Password not match");
return;

}

var users=JSON.parse(localStorage.getItem("skillhub_users"))||[];

if(users.some(u=>u.mobile===mobile)){

document.getElementById("mobileError").innerHTML="Mobile already exists";
return;

}

if(users.some(u=>u.username===username)){

document.getElementById("usernameError").innerHTML="Username already exists";
return;

}

signupGeneratedOTP=Math.floor(100000+Math.random()*900000);

sendWhatsAppOTP(mobile,signupGeneratedOTP,"Your SkillHub Signup OTP is:");

document.getElementById("signupOtpContainer").style.display="flex";

startTimer();

}


/* SAVE USER */

function saveUser(){

var userData={

fullname:document.getElementById("signupName").value,
mobile:document.getElementById("signupMobile").value,
username:document.getElementById("signupUsername").value,
password:document.getElementById("signupPassword").value

};

var users=JSON.parse(localStorage.getItem("skillhub_users"))||[];

users.push(userData);

localStorage.setItem("skillhub_users",JSON.stringify(users));

alert("Signup Successful");

backLogin();

}


/* LOGIN */

function login(){

var username=document.getElementById("username").value.trim();
var pass=document.getElementById("password").value.trim();

var users=JSON.parse(localStorage.getItem("skillhub_users"))||[];

var user=users.find(u=>u.username===username && u.password===pass);

if(!user){

alert("Invalid username or password");
return;

}

loginUser=user;

loginGeneratedOTP=Math.floor(100000+Math.random()*900000);

sendWhatsAppOTP(user.mobile,loginGeneratedOTP,"Your SkillHub Login OTP is:");

document.getElementById("loginOtpContainer").style.display="flex";

startLoginTimer();

}


/* OTP INPUT */

document.querySelectorAll("#signupOtpContainer input").forEach((box,index,boxes)=>{

box.addEventListener("input",function(){

if(box.value.length==1 && index<boxes.length-1){

boxes[index+1].focus();

}

var entered="";
boxes.forEach(b=>entered+=b.value);

if(entered.length==6){

if(entered==signupGeneratedOTP){

saveUser();

}else{

alert("Wrong OTP");

boxes.forEach(b=>b.value="");

boxes[0].focus();

}

}

});

});


document.querySelectorAll("#loginOtpContainer input").forEach((box,index,boxes)=>{

box.addEventListener("input",function(){

if(box.value.length==1 && index<boxes.length-1){

boxes[index+1].focus();

}

var entered="";
boxes.forEach(b=>entered+=b.value);

if(entered.length==6){

if(entered==loginGeneratedOTP){

alert("Login Successful");

document.getElementById("loginOtpContainer").style.display="none";

}else{

alert("Wrong OTP");

boxes.forEach(b=>b.value="");

boxes[0].focus();

}

}

});

});


/* TIMER */

function startTimer(){

var time=30;

document.getElementById("resendBtn").disabled=true;

document.getElementById("otpTimer").innerText=time+" sec";

clearInterval(timerInterval);

timerInterval=setInterval(function(){

time--;

document.getElementById("otpTimer").innerText=time+" sec";

if(time<=0){

clearInterval(timerInterval);

document.getElementById("otpTimer").innerText="You can resend OTP";

document.getElementById("resendBtn").disabled=false;

}

},1000);

}


function startLoginTimer(){

var time=30;

document.getElementById("loginResendBtn").disabled=true;

document.getElementById("loginOtpTimer").innerText=time+" sec";

clearInterval(loginTimer);

loginTimer=setInterval(function(){

time--;

document.getElementById("loginOtpTimer").innerText=time+" sec";

if(time<=0){

clearInterval(loginTimer);

document.getElementById("loginOtpTimer").innerText="You can resend OTP";

document.getElementById("loginResendBtn").disabled=false;

}

},1000);

}


/* RESEND OTP */

function resendOTP(){

var mobile=document.getElementById("signupMobile").value.trim();

signupGeneratedOTP=Math.floor(100000+Math.random()*900000);

sendWhatsAppOTP(mobile,signupGeneratedOTP,"Your SkillHub Signup OTP is:");

startTimer();

}


function resendLoginOTP(){

loginGeneratedOTP=Math.floor(100000+Math.random()*900000);

sendWhatsAppOTP(loginUser.mobile,loginGeneratedOTP,"Your SkillHub Login OTP is:");

startLoginTimer();

}


/* NAVIGATION */

function openSignup(){

document.getElementById("loginForm").style.display="none";
document.getElementById("signupForm").style.display="block";

}

function backLogin(){

document.getElementById("signupForm").style.display="none";
document.getElementById("loginForm").style.display="block";

}

</script>

</body>
</html>
```
