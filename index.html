<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    text-align:center;
    margin-top:60px;
}

.title{
    font-size:32px;
    font-weight:bold;
    color:#0078d7;
    margin-bottom:25px;
}

.container{
    background:white;
    width:450px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    font-size:16px;
}

.btns{
    display:flex;
    justify-content:center;
    gap:10px;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#0078d7;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.otp-container{
    display:none;
    justify-content:space-between; /* left boxes, right button */
    align-items:center;
    margin-top:15px;
}

.otp-box{
    width:30px;
    height:30px;
    font-size:16px;
    text-align:center;
    border:2px solid #ccc;
    border-radius:5px;
    outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
    padding:0;
    margin-right:5px;
}

.otp-box:focus{
    border-color:#0078d7;
    box-shadow:0 0 5px #0078d7;
}

.otp-container button{
    height:36px;
    padding:0 10px;
    font-size:14px;
    margin-left:10px;
}
</style>
</head>

<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN FORM -->
<div class="container" id="loginForm">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>

<div class="otp-container" id="otpContainer">
    <div>
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
    </div>
    <button onclick="resendOTP()">Resend OTP</button>
</div>

<div class="btns">
    <button onclick="login()">Login</button>
    <button onclick="openSignup()">Signup</button>
</div>

</div>

<!-- SIGNUP FORM -->
<div class="container" id="signupForm">

<h2>Create Account</h2>

<input type="text" id="signupName" placeholder="Full Name"><br>
<input type="text" id="signupMobile" placeholder="Mobile Number"><br>
<input type="text" id="signupUsername" placeholder="Username"><br>
<input type="password" id="signupPassword" placeholder="Password"><br>
<input type="password" id="signupConfirmPassword" placeholder="Confirm Password"><br>

<div class="otp-container" id="signupOtpContainer">
    <div>
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
    </div>
    <button onclick="resendSignupOTP()">Resend OTP</button>
</div>

<div class="btns">
    <button onclick="signup()">Create Account</button>
    <button onclick="backLogin()">Cancel</button>
</div>

</div>

<script>
// UltraMsg credentials
var token = "1xhtdh7bylh73iay";
var instance = "instance164778";

var generatedOTP;
var signupGeneratedOTP;

// OTP Timer variables
var loginOtpTimer;
var signupOtpTimer;
var loginOtpCountdown = 90;
var signupOtpCountdown = 90;

// ---------------- LOGIN ----------------
function login() {
    var username = document.getElementById("username").value.trim();
    var pass = document.getElementById("password").value.trim();

    var data = localStorage.getItem("skillhub_user");

    if (!data) {
        alert("No account found. Please signup first");
        return;
    }

    var user = JSON.parse(data);

    if (username == user.username && pass == user.password) {
        var mobile = user.mobile;
        sendLoginOTP(mobile);
    } else {
        alert("Invalid username or password");
    }
}

function sendLoginOTP(mobile){
    generatedOTP = Math.floor(100000 + Math.random() * 900000);

    document.getElementById("otpContainer").style.display = "flex";

    var boxes = document.querySelectorAll("#otpContainer input");
    boxes.forEach(b => b.value = "");
    boxes[0].focus();

    document.querySelector("#otpContainer button").disabled = true;

    startLoginOtpTimer();

    sendWhatsAppOTP(mobile, generatedOTP, "Your SkillHub login OTP is:");
}

function startLoginOtpTimer(){
    clearInterval(loginOtpTimer);
    loginOtpCountdown = 90;

    loginOtpTimer = setInterval(() => {
        document.querySelector("#otpContainer button").textContent = `Resend OTP (${loginOtpCountdown}s)`;
        loginOtpCountdown--;

        if(loginOtpCountdown < 0){
            clearInterval(loginOtpTimer);
            document.querySelector("#otpContainer button").textContent = "Resend OTP";
            document.querySelector("#otpContainer button").disabled = false;
        }
    }, 1000);
}

// ---------------- SIGNUP ----------------
function signup(){
    var pass = document.getElementById("signupPassword").value;
    var confirm = document.getElementById("signupConfirmPassword").value;

    if(pass != confirm){
        alert("Password not match");
        return;
    }

    signupGeneratedOTP = Math.floor(100000 + Math.random() * 900000);

    document.getElementById("signupOtpContainer").style.display = "flex";

    var mobile = document.getElementById("signupMobile").value.trim();
    document.querySelector("#signupOtpContainer button").disabled = true;

    startSignupOtpTimer();

    sendWhatsAppOTP(mobile, signupGeneratedOTP, "Your SkillHub signup OTP is:");
}

function startSignupOtpTimer(){
    clearInterval(signupOtpTimer);
    signupOtpCountdown = 90;

    signupOtpTimer = setInterval(() => {
        document.querySelector("#signupOtpContainer button").textContent = `Resend OTP (${signupOtpCountdown}s)`;
        signupOtpCountdown--;

        if(signupOtpCountdown < 0){
            clearInterval(signupOtpTimer);
            document.querySelector("#signupOtpContainer button").textContent = "Resend OTP";
            document.querySelector("#signupOtpContainer button").disabled = false;
        }
    }, 1000);
}

// ---------------- RESEND ----------------
function resendOTP(){
    var mobile = document.getElementById("username").value.trim();
    sendLoginOTP(mobile);
}

function resendSignupOTP(){
    var mobile = document.getElementById("signupMobile").value.trim();
    sendWhatsAppOTP(mobile, signupGeneratedOTP, "Your SkillHub signup OTP is:");
    startSignupOtpTimer();
}

// ---------------- WHATSAPP OTP ----------------
function sendWhatsAppOTP(number, otp, message){
    fetch(`https://api.ultramsg.com/${instance}/messages/chat`, {
        method: "POST",
        headers: {
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            token: token,
            to: number,
            body: `${message} ${otp}`
        })
    })
    .then(res => res.json())
    .then(data => console.log("OTP sent:", data))
    .catch(err => console.error("Error sending OTP:", err));
}

// ---------------- OTP INPUTS ----------------
document.querySelectorAll("#otpContainer input").forEach((box,index,boxes)=>{
    box.addEventListener("input", function(){
        if(box.value.length==1 && index<boxes.length-1){ boxes[index+1].focus(); }

        var entered = "";
        boxes.forEach(b=>entered+=b.value);

        if(entered.length==6){
            if(entered == generatedOTP){
                alert("Login Successful");
            } else {
                alert("Wrong OTP");
                boxes.forEach(b=>b.value="");
                boxes[0].focus();
            }
        }
    });
});

document.querySelectorAll("#signupOtpContainer input").forEach((box,index,boxes)=>{
    box.addEventListener("input", function(){
        if(box.value.length==1 && index<boxes.length-1){ boxes[index+1].focus(); }

        var entered = "";
        boxes.forEach(b=>entered+=b.value);

        if(entered.length==6){
            if(entered == signupGeneratedOTP){
                var userData = {
                    fullname: document.getElementById("signupName").value,
                    mobile: document.getElementById("signupMobile").value,
                    username: document.getElementById("signupUsername").value,
                    password: document.getElementById("signupPassword").value
                };
                localStorage.setItem("skillhub_user", JSON.stringify(userData));
                alert("Signup Successful");
                backLogin();
            } else {
                alert("Wrong OTP");
                boxes.forEach(b=>b.value="");
                boxes[0].focus();
            }
        }
    });
});

// ---------------- NAVIGATION ----------------
function openSignup(){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("signupForm").style.display="block";
}

function backLogin(){
    document.getElementById("signupForm").style.display="none";
    document.getElementById("loginForm").style.display="block";
}
</script>

</body>
</html>
