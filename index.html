<style>
/* BODY */
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    overflow:hidden;
    position:relative;
}
body::before, body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    opacity:0.2;
}
body::before{
    width:500px;
    height:500px;
    background:#fff;
    top:-100px;
    left:-100px;
}
body::after{
    width:400px;
    height:400px;
    background:#fff;
    bottom:-80px;
    right:-80px;
}
/* TITLE */
.title{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:32px;
    font-weight:bold;
    color:#fff;
    text-shadow:1px 1px 5px rgba(0,0,0,0.3);
}
/* CONTAINER */
.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:40px 30px;
    width:700px;
    color:#fff;
    text-align:center;
    margin-top:120px;
}
/* FORM TITLES */
.form-title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}
/* INPUT GROUPS */
.input-group{
    position:relative;
    margin:15px 0;
}
.input-group input, .input-group select{
    width:90%;
    padding:12px 40px 12px 25px;
    border-radius:20px;
    border:none;
    outline:none;
    font-size:16px;
    background:#fff;
    color:#000;
    box-sizing:border-box;
}
.input-group i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#000;
}
/* BUTTONS */
.btns{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:25px;
    flex-wrap:wrap;
}
button{
    padding:12px 30px;
    border-radius:25px;
    border:none;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    background:linear-gradient(135deg,#ff7eb3,#ff758c);
    color:#fff;
}
/* OTP BOX */
.otp-container{
    display:none;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:15px;
}
.otp-box{
    width:40px;
    height:40px;
    font-size:20px;
    text-align:center;
    border-radius:10px;
    border:1px solid #000;
    background:#fff;
    color:#000;
}
/* ERROR MESSAGES */
.error{
    color:#ff7070;
    font-size:14px;
}
/* HIDE FORMS INITIALLY */
#signupForm, #dashboard, #adminPanel, #addWorkForm{
    display:none;
}
/* SCROLLING for add worker form */
#addWorkForm{
    max-height:70vh;
    overflow-y:auto;
    padding-right:10px;
    margin-top:80px;
}
#addWorkForm::-webkit-scrollbar{
    width:8px;
}
#addWorkForm::-webkit-scrollbar-thumb{
    background: rgba(255,255,255,0.4);
    border-radius:4px;
}
#addWorkForm::-webkit-scrollbar-track{
    background: transparent;
}
/* GENDER RADIO BUTTONS styling */
.input-group.radio-group{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:93%;
    margin:20px auto;
    padding-left:20px;
}
.gender-option{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
}
.gender-option input{
    display:none;
}
.radio-circle{
    width:26px;
    height:26px;
    border-radius:50%;
    background:#fff;
    border:3px solid #e0e0e0;
    position:relative;
}
.gender-option input:checked + .radio-circle::after{
    content:"";
    width:12px;
    height:12px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}
/* DROPDOWNS */
.dropdown-row {
    display: flex;
    gap: 10px;
    width: 95%;
    box-sizing: border-box;
}
.dropdown-row > * {
    flex: 1;
}
.input-group-inline {
    position: relative;
}
.input-group-inline select {
    width: 95%;
    padding: 12px 35px 12px 12px;
    border-radius: 20px;
    border: none;
    outline: none;
    font-size: 16px;
    background: #fff;
    box-sizing: border-box;
}
/* Arrow for dropdown */
.input-group-inline::after {
    content: "\25BC";
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: #555;
}
/* Textbox styling */
#vehicle_number {
    padding: 12px 12px;
    border-radius: 20px;
    border: none;
    outline: none;
    font-size: 16px;
    background: #fff;
    box-sizing: border-box;
}
</style>
</head>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN FORM -->
<div class="container" id="loginForm">

    </div>

        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">

<!-- SIGNUP FORM -->

    </div>

                <option value="ride">Ride Type</option>
            </select>
        </div>

            <select id="service_type1">
                <option value="">Select Skill 1</option>
                <option value="plumber">Plumber</option>

<script>
/* DROPDOWN COLOR LOGIC */
document.querySelectorAll('.input-group-inline select').forEach(select => {
    if(select.value === "") select.style.color = "#888";
    else select.style.color = "#000";
    select.addEventListener('change', function() {
        this.style.color = (this.value === "") ? "#888" : "#000";
    });
});

/* DATE PICKER */
flatpickr("#worker_dob",{
    dateFormat:"d/m/Y",
    allowInput:false,
    monthSelectorType:"dropdown",
    yearSelectorType:"dropdown",
    defaultDate:"2000-01-01",
    position:"auto right"
});

/* PASSWORD TOGGLE */
function app_togglePassword(id,icon){
    var input=document.getElementById(id);
    if(input.type==="password"){
        input.type="text";
        icon.classList.replace("fa-eye","fa-eye-slash");
    } else {
        input.type="password";
        icon.classList.replace("fa-eye-slash","fa-eye");
    }
}

/* FORM REFERENCES */
var loginForm=document.getElementById("loginForm");
var signupForm=document.getElementById("signupForm");
var dashboard=document.getElementById("dashboard");
var adminPanel=document.getElementById("adminPanel");
var addWorkForm=document.getElementById("addWorkForm");

/* BACK TO LOGIN */
function backLogin(){
    resetSignupForm();
    resetAddWorkForm();
    loginForm.style.display="block";
    signupForm.style.display="none";
    dashboard.style.display="none";
    adminPanel.style.display="none";
    addWorkForm.style.display="none";
}

/* RESET SIGNUP FORM */
function resetSignupForm(){
    ["signupName","signupMobile","signupUsername","signup_password","signup_confirmPassword"].forEach(id=>{
        document.getElementById(id).value="";
    });
    document.getElementById("signupOtpContainer").style.display="none";
    document.getElementById("mobileError").innerText="";
    document.getElementById("usernameError").innerText="";
}

/* RESET ADD WORKER FORM */
function resetAddWorkForm(){
    ["worker_name","worker_father","worker_dob","worker_mobile","worker_address","vehicle_number"].forEach(id=>{
        document.getElementById(id).value="";
    });
    document.querySelectorAll('input[name="worker_gender"]').forEach(radio=>radio.checked=false);
    ["main_type","service_type1"].forEach(id=>{
        const sel=document.getElementById(id);
        if(sel){ sel.selectedIndex=0; sel.style.color="#888"; }
    });
}

/* SAVE WORKER */
function worker_save(){
    var workers=JSON.parse(localStorage.getItem("workers"))||[];
    var name=document.getElementById("worker_name").value;
    var mobile=document.getElementById("worker_mobile").value;
    var dob=document.getElementById("worker_dob").value;
    var address=document.getElementById("worker_address").value;
    var gender=document.querySelector('input[name="worker_gender"]:checked')?.value || '';
    var skill1=document.getElementById("service_type1")?.value || '';
    var type=document.getElementById("main_type")?.value || '';
    var vehicle=document.getElementById("vehicle_number")?.value || '';

    if(!name || !mobile){ alert("Please fill Name and Mobile!"); return; }

    workers.push({name,mobile,dob,address,gender,skill:[skill1],type,vehicle});
    localStorage.setItem("workers",JSON.stringify(workers));
    alert("Worker Added Successfully!");
}

/* ULTRAMSG API CONFIG */
var token = "1xhtdh7bylh73iay";     
var instance = "instance164778";

/* GENERATE OTP */
function generateOTP(){ return Math.floor(100000 + Math.random()*900000); }

/* SEND WORKER OTP */
function sendWorkerOTP(){
    var number=document.getElementById("worker_mobile").value.trim();
    if(!number){ alert("Enter Mobile Number first!"); return; }

    var otp = generateOTP();
    localStorage.setItem("lastWorkerOTP", otp);
    var message = "Your SkillHub OTP is: " + otp;

    fetch(`https://api.ultramsg.com/${instance}/messages/chat`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({token:token, to:number, body:message})
    })
    .then(res => res.json())
    .then(data => {
        console.log("OTP sent:", data);
        alert("OTP sent via WhatsApp!");
    })
    .catch(err => {
        console.error(err);
        alert("Failed to send OTP!");
    });
}

/* SEND WHATSAPP CONFIRMATION */
function sendWhatsAppWorker(){
    var number=document.getElementById("worker_mobile").value.trim();
    var name=document.getElementById("worker_name").value;
    var gender=document.querySelector('input[name="worker_gender"]:checked')?.value || '';
    if(!number || !name || !gender){ alert("Please fill Name, Mobile, and select Gender!"); return; }
    var msg=`Hello ${name}, Gender: ${gender}, Your registration is complete.`;
    var url=`https://wa.me/${number}?text=${encodeURIComponent(msg)}`;
    window.open(url,"_blank");
}

/* NAVIGATION FUNCTIONS */
function openAddWork(){ 
    loginForm.style.display="none"; 
    addWorkForm.style.display="block"; 
    document.getElementById("worker_dob").value=""; 
}
function openSignup(){ loginForm.style.display="none"; signupForm.style.display="block";}
function openAdmin(){ loginForm.style.display="none"; adminPanel.style.display="block";}
function logout(){ backLogin();}

/* LOGIN/SIGNUP STUBS */
function login_start(){ alert("Login logic goes here"); }
function signup_start(){ alert("Signup logic goes here"); }
</script>

flatpickr("#worker_dob",{dateFormat:"d/m/Y",allowInput:false,monthSelectorType:"dropdown",yearSelectorType:"dropdown",defaultDate:"2000-01-01"});

/* PASSWORD TOGGLE */
function app_togglePassword(id,icon){
    var input=document.getElementById(id);
    if(input.type==="password"){ input.type="text"; icon.classList.replace("fa-eye","fa-eye-slash"); }
    else{ input.type="password"; icon.classList.replace("fa-eye-slash","fa-eye"); }
}

/* FORM REFS */
var loginForm=document.getElementById("loginForm");
var addWorkForm=document.getElementById("addWorkForm");

/* NAVIGATION */
function openAddWork(){ loginForm.style.display="none"; addWorkForm.style.display="block"; }
function openSignup(){ loginForm.style.display="none"; }
function openAdmin(){ loginForm.style.display="none"; }
function backLogin(){ resetAddWorkForm(); loginForm.style.display="block"; addWorkForm.style.display="none"; }

/* RESET ADD WORKER FORM */
function resetAddWorkForm(){
    ["worker_name","worker_father","worker_dob","worker_mobile","worker_address","vehicle_number"].forEach(id=>document.getElementById(id).value="");
    document.querySelectorAll('input[name="worker_gender"]').forEach(r=>r.checked=false);
    ["main_type","service_type1"].forEach(id=>{const sel=document.getElementById(id); if(sel){sel.selectedIndex=0; sel.style.color="#888";}});
}

/* SAVE WORKER */
function worker_save(){
    var workers=JSON.parse(localStorage.getItem("workers"))||[];
    var name=document.getElementById("worker_name").value;
    var mobile=document.getElementById("worker_mobile").value;
    if(!name||!mobile){ alert("Name and Mobile required!"); return; }
    workers.push({
        name,
        mobile,
        dob:document.getElementById("worker_dob").value,
        address:document.getElementById("worker_address").value,
        gender:document.querySelector('input[name="worker_gender"]:checked')?.value||'',
        skill:[document.getElementById("service_type1")?.value||''],
        type:document.getElementById("main_type")?.value||'',
        vehicle:document.getElementById("vehicle_number")?.value||''
    });
    localStorage.setItem("workers",JSON.stringify(workers));
    alert("Worker Added!");
}

var token="1xhtdh7bylh73iay";

/* GENERATE OTP */
function generateOTP(){ return Math.floor(100000+Math.random()*900000); }

/* SEND WORKER OTP */
function sendWorkerOTP(){
    var number=document.getElementById("worker_mobile").value.trim();
    if(!number){ alert("Enter Mobile!"); return; }
    var otp=generateOTP();
    localStorage.setItem("lastWorkerOTP",otp);
    var message="Your SkillHub OTP is: "+otp;
    fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({token:token,to:number,body:message})
    }).then(res=>res.json())
      .then(data=>{ console.log("OTP sent:",data); alert("OTP sent via WhatsApp!"); })
      .catch(err=>{ console.error(err); alert("Failed to send OTP!"); });
}

/* SEND WHATSAPP */
function sendWhatsAppWorker(){
    var number=document.getElementById("worker_mobile").value.trim();
    var name=document.getElementById("worker_name").value;
    var gender=document.querySelector('input[name="worker_gender"]:checked')?.value||'';
    if(!number||!name||!gender){ alert("Fill Name, Mobile & Gender!"); return; }
    var msg=`Hello ${name}, Gender: ${gender}, Your registration is complete.`;
    window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg)}`,"_blank");
}
