<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    text-align:center;
    margin-top:60px;
}

.title{
    font-size:32px;
    font-weight:bold;
    color:#0078d7;
    margin-bottom:25px;
}

.container{
    background:white;
    width:360px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    font-size:16px;
}

.btns{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#0078d7;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.signup{ background:#0078d7; }
.back{ background:#ff9800; }
.create{ background:#0078d7; }
.cancel{ background:#0078d7; }

.otp-container{
    display:flex;
    justify-content:center;
    gap:4px;
    margin-top:10px;
    display:none;
}

.otp-box{
    width:22px;
    height:22px;
    font-size:14px;
    text-align:center;
    padding:0;
}

#signupForm{
    display:none;
}
</style>

</head>
<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN FORM -->
<div class="container" id="loginForm">
<h2>Login</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>

<div class="otp-container" id="otpContainer">

<input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" disabled onkeyup="move(this,0,event)">
<input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" disabled onkeyup="move(this,1,event)">
<input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" disabled onkeyup="move(this,2,event)">
<input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" disabled onkeyup="move(this,3,event)">
<input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" disabled onkeyup="move(this,4,event)">
<input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" disabled onkeyup="move(this,5,event)">

</div>

<div class="btns">
<button onclick="login()">Login</button>
<button class="signup" onclick="openSignup()">Signup</button>
</div>
</div>

<!-- SIGNUP FORM -->
<div class="container" id="signupForm">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name"><br>
<input type="text" placeholder="Mobile Number" id="signupMobile"><br>
<input type="text" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>
<input type="password" placeholder="Confirm Password"><br>

<div class="btns">
<button class="create">Create Account</button>
<button class="cancel" onclick="backLogin()">Cancel</button>
</div>

</div>

<script>

var generatedOTP;
var otpEnabled = false;

// LOGIN FUNCTION
function login(){

var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

if(user=="" || pass==""){
alert("Please enter Username and Password");
return;
}

// Generate OTP
generatedOTP=Math.floor(100000 + Math.random()*900000);

var message="Your SkillHub OTP is: "+generatedOTP;

var token="1xhtdh7bylh73iay";
var instance="instance164778";
var phone="919918841855";

fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

token:token,
to:phone,
body:message

})

})

.then(response=>response.json())

.then(data=>{

alert("OTP sent via WhatsApp!");

document.getElementById("otpContainer").style.display="flex";

otpEnabled=true;

var boxes=document.getElementsByClassName("otp-box");

for(var i=0;i<boxes.length;i++){

boxes[i].disabled=false;
boxes[i].value="";

}

boxes[0].focus();

})

.catch(error=>{

alert("Failed to send OTP");

});

}

// OTP MOVE FUNCTION
function move(field,index,event){

if(!otpEnabled) return;

var boxes=document.getElementsByClassName("otp-box");

var key=event.key;

// BACKSPACE
if(key==="Backspace"){

if(field.value.length===0 && index>0){

boxes[index-1].focus();

}

return;

}

// ENTER KEY
if(key==="Enter"){

if(index < boxes.length-1){

boxes[index+1].focus();

}

return;

}

// NUMBER ENTER
if(field.value.length===1){

if(index < boxes.length-1){

boxes[index+1].focus();

}

}

// CHECK OTP
var entered="";

for(var i=0;i<boxes.length;i++){

entered+=boxes[i].value;

}

if(entered.length===6){

if(entered==generatedOTP){

alert("Login Successful");

for(var i=0;i<boxes.length;i++){

boxes[i].value="";
boxes[i].disabled=true;

}

document.getElementById("otpContainer").style.display="none";

document.getElementById("username").value="";
document.getElementById("password").value="";

otpEnabled=false;

window.location="dashboard.html";

}

else{

alert("Wrong OTP");

for(var i=0;i<boxes.length;i++){

boxes[i].value="";

}

boxes[0].focus();

}

}

}

// OPEN SIGNUP
function openSignup(){

document.getElementById("loginForm").style.display="none";
document.getElementById("signupForm").style.display="block";

}

// BACK LOGIN
function backLogin(){

document.getElementById("signupForm").style.display="none";
document.getElementById("loginForm").style.display="block";

}

</script>

</body>
</html>
