<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:100px;">

<h2>SkillHub Login</h2>

<input type="text" placeholder="Username"><br><br>

<input type="password" placeholder="Password"><br><br>

<button onclick="sendOTP()">Send OTP</button>

<br><br>

<input type="text" id="otp" placeholder="Enter OTP"><br><br>

<button onclick="verifyOTP()">Login</button>

<script>

var otp;

function sendOTP(){
otp=Math.floor(100000+Math.random()*900000);
alert("WhatsApp OTP: "+otp);
}

function verifyOTP(){

var userOTP=document.getElementById("otp").value;

if(userOTP==otp){
window.location="dashboard.html";
}
else{
alert("Wrong OTP");
}

}

</script>

</body>
</html>
