<!DOCTYPE html>
<html>
<head>
<title>Add Worker</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* CONTAINER */
.worker-container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:25px;
    width:400px;
    text-align:center;
    color:#fff;
}

/* INPUT */
.worker-container input,
.worker-container select{
    width:90%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:20px;
    outline:none;
    font-size:15px;
}

/* ICON INPUT */
.input-group{
    position:relative;
}
.input-group i{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    color:#888;
}

/* GENDER */
.gender-box{
    display:flex;
    justify-content:space-around;
    margin:15px 0;
}
.gender-box label{
    cursor:pointer;
}

/* BUTTON */
button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff758c;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="worker-container">
    <h2>Add Worker</h2>

    <div class="input-group">
        <input type="text" id="worker_name" placeholder="Full Name">
        <i class="fa fa-user"></i>
    </div>

    <div class="input-group">
        <input type="text" id="worker_mobile" placeholder="Mobile Number">
        <i class="fa fa-phone"></i>
    </div>

    <!-- GENDER -->
    <div class="gender-box">
        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="female"> Female</label>
    </div>

    <!-- TYPE -->
    <select id="worker_type" onchange="toggleFields()">
        <option value="">Select Type</option>
        <option value="worker">Worker</option>
        <option value="vehicle">Vehicle</option>
    </select>

    <!-- SKILL -->
    <select id="worker_skill">
        <option value="">Select Skill</option>
    </select>

    <!-- VEHICLE -->
    <input type="text" id="vehicle_no" placeholder="Vehicle Number" style="display:none">

    <button onclick="saveWorker()">Submit</button>
</div>

<script>

/* TOGGLE FIELDS */
function toggleFields(){
    let type = document.getElementById("worker_type").value;
    let skill = document.getElementById("worker_skill");
    let vehicle = document.getElementById("vehicle_no");

    skill.innerHTML = "<option value=''>Select</option>";

    if(type === "worker"){
        vehicle.style.display = "none";

        let list = ["Labour","Helper","Mason","Electrician"];
        list.forEach(i=>{
            let opt = document.createElement("option");
            opt.value = i;
            opt.text = i;
            skill.appendChild(opt);
        });
    }
    else if(type === "vehicle"){
        vehicle.style.display = "block";

        let list = ["Bike","Car","Truck"];
        list.forEach(i=>{
            let opt = document.createElement("option");
            opt.value = i;
            opt.text = i;
            skill.appendChild(opt);
        });
    }
}

/* SAVE WORKER */
function saveWorker(){
    let name = document.getElementById("worker_name").value;
    let mobile = document.getElementById("worker_mobile").value;
    let gender = document.querySelector('input[name="gender"]:checked');
    let type = document.getElementById("worker_type").value;
    let skill = document.getElementById("worker_skill").value;
    let vehicle = document.getElementById("vehicle_no").value;

    if(!name || !mobile || !gender || !type){
        alert("Please fill all required fields");
        return;
    }

    let workers = JSON.parse(localStorage.getItem("workers")) || [];

    workers.push({
        name,
        mobile,
        gender: gender.value,
        type,
        skill,
        vehicle
    });

    localStorage.setItem("workers", JSON.stringify(workers));

    alert("Worker Saved Successfully");

    location.reload();
}

</script>

</body>
</html>
