<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillHub & Hiring Services</title>

<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: white;
}

.container {
    width: 700px;
    height: 70vh;
    overflow-y: auto;
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
}

h2, h3 {
    text-align: center;
}

input, select {
    width: 95%;
    height: 45px;
    margin: 10px 0;
    border-radius: 50px;
    border: none;
    padding: 0 15px;
}

.gender-box {
    display: flex;
    gap: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 50px;
    background: #ff758c;
    color: white;
    cursor: pointer;
}

button.file-btn {
    background: #6c757d !important;
}

.upload-row {
    display: flex;
    align-items: center;
    gap: 15px;
}

#fileName {
    font-size: 14px;
    max-width: 200px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}

.service-row {
    display: flex;
    gap: 5px;
}

.service-row select,
.vehicle-box {
    flex: 1;
}

.vehicle-box input {
    width: 85%;
}

.doc-box {
    background: rgba(255,255,255,0.15);
    padding: 15px;
    border-radius: 15px;
}

#cv {
    display: none;
}
</style>

</head>

<body>

<h1 style="text-align:center;">SkillHub & Hiring Services</h1>

<div class="container">

<h2>Worker Registration</h2>

<h3>Personal Details</h3>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="dob" placeholder="Date of Birth">

<div class="gender-box">
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Other"> Other</label>
</div>

<h3>Contact Details</h3>

<input type="text" id="mobile" placeholder="Mobile Number" maxlength="10">

<input type="email" id="email" placeholder="Email">

<input type="text" id="address" placeholder="Address">

<h3>Service Details</h3>

<div class="service-row">

<select id="type" onchange="loadOptions()">
<option value="">Select Type</option>
<option value="worker">Worker</option>
<option value="vehicle">Vehicle</option>
</select>

<select id="subtype"></select>

</div>

<div id="vehicleBox" style="display:none;">
<input type="text" placeholder="Vehicle Number">
</div>

<h3>Upload CV</h3>

<button class="file-btn" id="fileBtn" onclick="handleFile()">Choose File</button>
<span id="fileName"></span>

<input type="file" id="cv" onchange="updateButton()">

<br><br>

<button onclick="save()">Submit</button>
<button onclick="resetForm()">Reset</button>

</div>

<script>

$("#dob").datepicker({
    changeMonth: true,
    changeYear: true,
    yearRange: "1900:2126",
    dateFormat: "dd/mm/yy"
});

function loadOptions(){
    let type = document.getElementById("type").value;
    let sub = document.getElementById("subtype");
    let vehicleBox = document.getElementById("vehicleBox");

    sub.innerHTML = "";

    let workerList = ["Labour","Helper","Mason","Carpenter","Electrician"];
    let vehicleList = ["Bike","Car","Truck","Bus"];

    if(type === "worker"){
        vehicleBox.style.display = "none";
        workerList.forEach(i => sub.add(new Option(i,i)));
    } else if(type === "vehicle"){
        vehicleBox.style.display = "block";
        vehicleList.forEach(i => sub.add(new Option(i,i)));
    }
}

function updateButton(){
    let file = document.getElementById("cv");
    let nameText = document.getElementById("fileName");

    if(file.files.length){
        nameText.innerText = file.files[0].name;
    }
}

function handleFile(){
    let file = document.getElementById("cv");

    if(!file.files.length){
        file.click();
    } else {
        window.open(URL.createObjectURL(file.files[0]));
    }
}

function save(){

    let name = document.getElementById("name").value.trim();
    let father = document.getElementById("father").value.trim();
    let dob = document.getElementById("dob").value;
    let gender = document.querySelector('input[name="gender"]:checked');
    let mobile = document.getElementById("mobile").value.trim();
    let email = document.getElementById("email").value.trim();
    let address = document.getElementById("address").value.trim();
    let type = document.getElementById("type").value;
    let subtype = document.getElementById("subtype").value;

    let fileInput = document.getElementById("cv");
    let file = fileInput.files[0];

    if(!name || !father || !dob || !gender || !mobile){
        alert("⚠ Fill required fields");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    function finalSave(fileData){

        users.push({
            name,
            father,
            dob,
            gender: gender.value,
            mobile,
            email,
            address,
            type,
            subtype,
            fileName: file ? file.name : "",
            fileData: fileData || ""
        });

        localStorage.setItem("users", JSON.stringify(users));

        alert("✅ Saved Successfully");

        resetForm();
    }

    if(file){
        let reader = new FileReader();
        reader.onload = e => finalSave(e.target.result);
        reader.readAsDataURL(file);
    } else {
        finalSave("");
    }
}

function resetForm(){
    document.getElementById("name").value = "";
    document.getElementById("father").value = "";
    document.getElementById("dob").value = "";
    document.getElementById("mobile").value = "";
    document.getElementById("email").value = "";
    document.getElementById("address").value = "";
    document.getElementById("fileName").innerText = "";
    document.getElementById("cv").value = "";
}

</script>

</body>
</html>
