<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<!-- Font Awesome for icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<!-- Flatpickr CSS for date picker -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<!-- Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
/* BODY: gradient background, center content, full viewport */
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    overflow:hidden;
    position:relative;
}

/* Decorative circles in background */
body::before, body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    opacity:0.2;
}
body::before{
    width:500px;
    height:500px;
    background:#fff;
    top:-100px;
    left:-100px;
}
body::after{
    width:400px;
    height:400px;
    background:#fff;
    bottom:-80px;
    right:-80px;
}

/* TITLE: fixed at top */
.title{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:32px;
    font-weight:bold;
    color:#fff;
    text-shadow:1px 1px 5px rgba(0,0,0,0.3);
}

/* CONTAINER: glass effect for forms */
.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:40px 30px;
    width:700px;
    color:#fff;
    text-align:center;
    margin-top:120px;
}

/* FORM TITLES */
.form-title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

/* INPUT GROUPS: spacing and icon positioning */
.input-group{
    position:relative;
    margin:15px 0;
}
.input-group input,
.input-group select{
    width:90%;
    padding:12px 40px 12px 25px;
    border-radius:20px;
    border:none;
    outline:none;
    font-size:16px;
    background:#fff;
    color:#000;
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    box-sizing:border-box;
}
.input-group i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#000;
}

/* BUTTONS: general style for all buttons */
.btns{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:25px;
    flex-wrap:wrap;
}
button{
    padding:12px 30px;
    border-radius:25px;
    border:none;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    background:linear-gradient(135deg,#ff7eb3,#ff758c);
    color:#fff;
}

/* OTP BOX: hidden by default */
.otp-container{
    display:none;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:15px;
}
.otp-box{
    width:40px;
    height:40px;
    font-size:20px;
    text-align:center;
    border-radius:10px;
    border:1px solid #000;
    background:#fff;
    color:#000;
}

/* ERROR MESSAGES */
.error{
    color:#ff7070;
    font-size:14px;
}

/* HIDE FORMS INITIALLY */
#signupForm, #dashboard, #adminPanel, #addWorkForm{
    display:none;
}

/* SCROLLING for add worker form */
#addWorkForm{
    max-height:70vh;
    overflow-y:auto;
    padding-right:10px;
    margin-top:80px;
}
#addWorkForm::-webkit-scrollbar{
    width:8px;
}
#addWorkForm::-webkit-scrollbar-thumb{
    background: rgba(255,255,255,0.4);
    border-radius:4px;
}
#addWorkForm::-webkit-scrollbar-track{
    background: transparent;
}

/* GENDER RADIO BUTTONS styling */
.input-group.radio-group{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:93%;
    margin:20px auto; 
    padding-left:20px;    
}
.gender-option{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
}
.gender-option input{
    display:none;
}
.radio-circle{
    width:26px;
    height:26px;
    border-radius:50%;
    background:#fff;
    border:3px solid #e0e0e0;
    position:relative;
}
.gender-option input:checked + .radio-circle::after{
    content:"";
    width:12px;
    height:12px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}
.gender-option i{
    font-size:24px;
    color:#000;
}

/* DROPDOWNS for skills */
/* Container row */
.dropdown-row {
    display: flex;                  /* inline row */
    gap: 5px;                       /* gap reduce from 15px -> 5px */
    justify-content: flex-start;    /* align to left */
    align-items: center;            /* vertical alignment */
    margin: 0;
    padding: 0;
}

/* Each dropdown inline */
.input-group-inline {
    position: relative;
    flex: 1;                        /* equal width for all three */
   
}

/* Select styling remains same */
.input-group-inline select {
    width: 80%;
    padding: 12px 25px 12px 15px; 
    border-radius: 20px;
    border: none;
    outline: none;
    font-size: 16px;
    background: #fff;
    color: #000;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    box-sizing: border-box;
    cursor: pointer;
    text-indent: 0px; 
}

/* Optional: custom arrow */
.input-group-inline::after {
    content: "\25BC"; 
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: #555;
    font-size: 16px;
}
</style>
</head>
<body>

<!-- PAGE TITLE -->
<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN FORM -->
<div class="container" id="loginForm">
<h2 class="form-title">Login</h2>
<div class="input-group">
    <input type="text" id="login_username" placeholder="Username">
    <i class="fa fa-user"></i>
</div>
<div class="input-group">
    <input type="password" id="login_password" placeholder="Password">
    <i class="fa fa-eye" onclick="app_togglePassword('login_password',this)"></i>
</div>
<div class="otp-container" id="loginOtpContainer">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <button id="loginResendBtn" disabled>Resend</button>
</div>
<div class="btns">
    <button onclick="login_start()">Login</button>
    <button onclick="openSignup()">Signup</button>
    <button onclick="openAdmin()">Admin</button>
    <button onclick="openAddWork()">Add Worker</button>
</div>
</div>

<!-- SIGNUP FORM -->
<div class="container" id="signupForm">
<h2 class="form-title">Signup</h2>
<div class="input-group">
    <input type="text" id="signupName" placeholder="Full Name">
    <i class="fa fa-user"></i>
</div>
<div class="input-group">
    <input type="text" id="signupMobile" placeholder="Mobile Number">
    <i class="fa fa-phone"></i>
</div>
<div id="mobileError" class="error"></div>
<div class="input-group">
    <input type="text" id="signupUsername" placeholder="Username">
    <i class="fa fa-user"></i>
</div>
<div id="usernameError" class="error"></div>
<div class="input-group">
    <input type="password" id="signup_password" placeholder="Password">
    <i class="fa fa-eye" onclick="app_togglePassword('signup_password',this)"></i>
</div>
<div class="input-group">
    <input type="password" id="signup_confirmPassword" placeholder="Confirm Password">
    <i class="fa fa-eye" onclick="app_togglePassword('signup_confirmPassword',this)"></i>
</div>
<div class="otp-container" id="signupOtpContainer">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <button id="resendBtn" disabled>Resend OTP</button>
</div>
<div class="btns">
    <button onclick="signup_start()">Create Account</button>
    <button onclick="backLogin()">Cancel</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard">
<h2 class="form-title">Dashboard</h2>
<p id="dashboardName"></p>
<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN PANEL -->
<div class="container" id="adminPanel">
<h2>Hello Admin</h2>
<button onclick="backLogin()">Back</button>
</div>

<!-- ADD WORKER FORM -->
<div class="container" id="addWorkForm">
<h2 class="form-title">Add Worker</h2>
<div class="input-group">
    <input type="text" id="worker_name" placeholder="Full Name">
    <i class="fa fa-user"></i>
</div>
<div class="input-group">
    <input type="text" id="worker_father" placeholder="Father Name">
    <i class="fa fa-user"></i>
</div>
<div class="input-group">
    <input type="text" id="worker_dob" placeholder="Date of Birth">
    <i class="fa fa-calendar"></i>
</div>
<div class="input-group radio-group">
<label class="gender-option">
<input type="radio" name="worker_gender" value="male">
<span class="radio-circle"></span>
<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" width="24">
</label>
<label class="gender-option">
<input type="radio" name="worker_gender" value="female">
<span class="radio-circle"></span>
<img src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png" width="24">
</label>
<label class="gender-option">
<input type="radio" name="worker_gender" value="other">
<span class="radio-circle"></span>
<img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" width="24">
</label>
</div>
<div class="input-group">
    <input type="text" id="worker_mobile" placeholder="Mobile Number">
    <i class="fa fa-phone"></i>
</div>
<div class="dropdown-row">
  <div class="input-group-inline">
    <select id="main_type" required>
      <option value="" disabled selected>Select Any One</option>
      <option value="workers">Workers</option>
      <option value="ride">Ride Type</option>
    </select>
  </div>
  <div class="input-group-inline">
    <select id="service_type1">
      <option value="">Select Skill 1</option>
      <option value="plumber">Plumber</option>
      <option value="electrician">Electrician</option>
      <option value="mason">Mason</option>
    </select>
  </div>
  <div class="input-group-inline">
    <select id="service_type2">
      <option value="">Select Skill 2</option>
      <option value="plumber">Plumber</option>
      <option value="electrician">Electrician</option>
      <option value="mason">Mason</option>
    </select>
  </div>
</div>
<div class="input-group">
    <input type="text" id="worker_address" placeholder="Address">
    <i class="fa fa-home"></i>
</div>
<div class="btns">
    <button onclick="worker_save()">Submit Worker</button>
    <button onclick="backLogin()">Back</button>
</div>
</div>

<script>
/* Date picker for DOB */
flatpickr("#worker_dob",{
    dateFormat:"d/m/Y",
    allowInput:false,
    monthSelectorType:"dropdown",
    yearSelectorType:"dropdown",
    defaultDate:"2000-01-01",
    position:"auto right"
});

/* Toggle password visibility */
function app_togglePassword(id,icon){
    var input=document.getElementById(id);
    if(input.type==="password"){
        input.type="text";
        icon.classList.replace("fa-eye","fa-eye-slash");
    } else {
        input.type="password";
        icon.classList.replace("fa-eye-slash","fa-eye");
    }
}

/* Form references */
var loginForm=document.getElementById("loginForm");
var signupForm=document.getElementById("signupForm");
var dashboard=document.getElementById("dashboard");
var adminPanel=document.getElementById("adminPanel");
var addWorkForm=document.getElementById("addWorkForm");

/* Back to login */
function backLogin(){
    resetSignupForm();
    resetAddWorkForm();
    loginForm.style.display="block";
    signupForm.style.display="none";
    dashboard.style.display="none";
    adminPanel.style.display="none";
    addWorkForm.style.display="none";
}

/* Reset signup form inputs */
function resetSignupForm(){
    ["signupName","signupMobile","signupUsername","signup_password","signup_confirmPassword"].forEach(id=>{
        document.getElementById(id).value="";
    });
    document.getElementById("signupOtpContainer").style.display="none";
    document.getElementById("mobileError").innerText="";
    document.getElementById("usernameError").innerText="";
}

/* Reset add worker form */
function resetAddWorkForm(){
    ["worker_name","worker_father","worker_dob","worker_mobile","worker_address"].forEach(id=>{
        document.getElementById(id).value="";
    });
    document.querySelectorAll('input[name="worker_gender"]').forEach(radio=>{
        radio.checked = false;
    });
    ["main_type","service_type1","service_type2"].forEach(id=>{
        const sel = document.getElementById(id);
        if(sel) sel.selectedIndex = 0;
    });
}

/* Save worker to localStorage */
function worker_save(){
    var workers=JSON.parse(localStorage.getItem("workers"))||[];
    var worker_name_el=document.getElementById("worker_name");
    var worker_mobile_el=document.getElementById("worker_mobile");
    var worker_dob_el=document.getElementById("worker_dob");
    var worker_address_el=document.getElementById("worker_address");
    workers.push({
        name:worker_name_el.value,
        mobile:worker_mobile_el.value,
        skill:[
            document.getElementById("service_type1")?.value,
            document.getElementById("service_type2")?.value
        ],
        location:worker_address_el?.value,
        dob:worker_dob_el.value,
        gender: document.querySelector('input[name="worker_gender"]:checked')?.value || ''
    });
    localStorage.setItem("workers",JSON.stringify(workers));
    alert("Worker Added");
    backLogin();
}

/* OTP & WhatsApp logic */
var token="1xhtdh7bylh73iay";
var instance="instance164778";
function generateOTP(){ return Math.floor(100000+Math.random()*900000);}
function sendWorkerOTP(){
    var number=document.getElementById("worker_mobile").value.trim();
    if(!number){ alert("Enter mobile number first!"); return;}
    var otp=generateOTP();
    localStorage.setItem("lastWorkerOTP",otp);
    var message="Your SkillHub OTP is: "+otp;
    fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({token:token,to:number,body:message})
    }).then(res=>res.json())
      .then(data=>{ console.log("OTP sent:",data); alert("OTP sent via WhatsApp!"); })
      .catch(err=>{ console.error(err); alert("Failed to send OTP!"); });
}
function sendWhatsAppWorker(){
    var number=document.getElementById("worker_mobile").value.trim();
    var gender=document.querySelector('input[name="worker_gender"]:checked')?.value||''; 
    var name=document.getElementById("worker_name").value;
    if(!number || !name || !gender){ alert("Please fill name, mobile and select gender first!"); return;}
    var msg=`Hello ${name}, Gender: ${gender}, Your registration is complete.`;
    var url=`https://wa.me/${number}?text=${encodeURIComponent(msg)}`;
    window.open(url,"_blank");
}

/* Navigation functions */
function openAddWork(){ loginForm.style.display="none"; addWorkForm.style.display="block"; worker_dob.value=""; worker_dob.placeholder="Date of Birth";}
function openSignup(){ loginForm.style.display="none"; signupForm.style.display="block";}
function openAdmin(){ loginForm.style.display="none"; adminPanel.style.display="block";}
function logout(){ backLogin();}
function login_start(){ alert("Login logic goes here"); }
function signup_start(){ alert("Signup logic goes here"); }
</script>

</body>
</html>
