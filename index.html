<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<!-- Flatpickr CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    overflow: hidden;
}
.worker-container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:25px;
    width:700px;
    text-align:center;
    color:#fff;
    margin: 20px auto;
    height: 70vh;
    overflow-y: auto;
}
.input-group{
    position:relative;
    margin:12px 0;
}
.input-group input{
    width:90%;
    padding:12px 40px 12px 15px;
    border:none;
    border-radius:20px;
    outline:none;
    cursor: pointer;
}
.input-group i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    color:#888;
    cursor: pointer;
}
.dropdown-row {
    display: flex;
    gap: 10px;
    width: 98%;
    max-width:98%;
    margin: 10px auto;
    align-items: center;
}
.dropdown-row > * {
    flex: 1;
    min-width: 0;
}
.dropdown-row select,
.dropdown-row input {
    padding: 12px 15px;
    border-radius: 20px;
    border: none;
    font-size: 16px;
    outline: none;
    background: #fff;
    color: #888;
    box-sizing: border-box;
}
select option[value=""] {
    color: #888;
}
select.active {
    color: #000;
}
#service_type1,
#vehicle_number {
    visibility: hidden;
}
.dropdown-row.show-all > * {
    flex: 1;
    visibility: visible;
}
.gender-box{
    display:flex;
    justify-content:space-around;
    margin:15px 0;
}
.gender-option{
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
}
.gender-option input{
    display:none;
}
.radio-circle{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#fff;
    border:2px solid #ccc;
    position:relative;
}
.gender-option input:checked + .radio-circle::after{
    content:"";
    width:10px;
    height:10px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}
.button-group{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}
button{
    padding:10px 25px;
    border:none;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(135deg,#ff7eb3,#ff758c);
    color:#fff;
}
</style>
</head>

<body>

<h1 style="text-align:center; color:white; margin-top:20px; margin-bottom:20px;">SkillHub Hiring Services</h1>

<div class="worker-container">
    <h2>Add Worker</h2>

    <div class="input-group">
        <input type="text" id="worker_name" placeholder="Full Name">
        <i class="fa fa-user"></i>
    </div>
    
    <div class="input-group">
        <input type="text" id="worker_father" placeholder="Father Name">
        <i class="fa fa-user"></i>
    </div>

    <div class="input-group">
        <input type="text" id="worker_dob" placeholder="Date of Birth" readonly>
        <i class="fa fa-calendar" id="dob_icon"></i>
    </div>
    
    <div class="gender-box">
        <label class="gender-option">
            <input type="radio" name="gender" value="male">
            <span class="radio-circle"></span> Male
        </label>

        <label class="gender-option">
            <input type="radio" name="gender" value="female">
            <span class="radio-circle"></span> Female
        </label>

        <label class="gender-option">
            <input type="radio" name="gender" value="other">
            <span class="radio-circle"></span> Other
        </label>
    </div>
    
    <div class="input-group">
        <input type="text" id="worker_mobile" placeholder="Mobile Number">
        <i class="fa fa-phone"></i>
    </div> 

    <div class="input-group">
        <input type="email" id="worker_email" placeholder="Email Address">
        <i class="fa fa-envelope"></i>
    </div>

    <div class="input-group">
        <input type="text" id="worker_address" placeholder="Address">
        <i class="fa fa-home"></i>
    </div>
    
    <div class="dropdown-row" id="dropdownRow">
        <select id="service_type" onchange="toggleFields(); updateSelectColor(this)">
            <option value="" selected>Select Type</option>
            <option value="worker">Worker</option>
            <option value="vehicle">Vehicle</option>
        </select>

        <select id="service_type1" onchange="updateSelectColor(this)">
            <option value="" selected>Select Skill</option>
        </select>

        <input type="text" id="vehicle_number" placeholder="Vehicle No">
    </div>

    <div class="button-group">
        <button onclick="saveWorker()">Submit</button>
        <button onclick="resetForm()">Reset</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
function updateSelectColor(el){
    if(el.value === ""){
        el.classList.remove("active");
    } else {
        el.classList.add("active");
    }
}

function toggleFields(){
    let type = document.getElementById("service_type").value;
    let skill = document.getElementById("service_type1");
    let vehicle = document.getElementById("vehicle_number");
    let row = document.getElementById("dropdownRow");

    skill.innerHTML = "<option value='' selected>Select Skill</option>";
    row.classList.remove("show-all");

    if(type === "worker"){
        skill.style.visibility = "visible";
        vehicle.style.visibility = "hidden";

        ["Labour","Helper","Mason","Electrician"].forEach(i=>{
            skill.add(new Option(i,i));
        });
    }
    else if(type === "vehicle"){
        skill.style.visibility = "visible";
        vehicle.style.visibility = "visible";
        row.classList.add("show-all");

        ["Bike","Car","Truck"].forEach(i=>{
            skill.add(new Option(i,i));
        });
    }
    else{
        skill.style.visibility = "hidden";
        vehicle.style.visibility = "hidden";
    }
}

function saveWorker(){
    let name = document.getElementById("worker_name").value;
    let mobile = document.getElementById("worker_mobile").value;
    let gender = document.querySelector('input[name="gender"]:checked');
    let type = document.getElementById("service_type").value;

    if(!name || !mobile || !gender || !type){
        alert("Please fill all required fields");
        return;
    }

    let workers = JSON.parse(localStorage.getItem("workers")) || [];

    workers.push({
        name,
        mobile,
        gender: gender.value,
        type
    });

    localStorage.setItem("workers", JSON.stringify(workers));

    alert("Worker Saved Successfully");
}

function resetForm(){
    location.reload();
}

/* ✅ FIXED DATE PICKER */
flatpickr("#worker_dob", {
    clickOpens: false,
    position: "auto right",
    allowInput: false,
    dateFormat: "d/m/Y",
    monthSelectorType: "dropdown",
    minDate: "1950-01-01",
    maxDate: "today",
    onReady: function(selectedDates, dateStr, instance) {
        const yearInput = instance.currentYearElement;
        yearInput.type = "number";
        yearInput.min = 1950;
        yearInput.max = new Date().getFullYear();
        yearInput.style.width = "80px";
    }
});

document.getElementById("dob_icon").addEventListener("click", function() {
    document.getElementById("worker_dob")._flatpickr.open();
});
</script>

</body>
</html>
