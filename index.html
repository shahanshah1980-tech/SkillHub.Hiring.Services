
<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

/* Body + Background */

body{
margin:0;
font-family:Arial,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#00c6ff,#0072ff);
overflow:hidden;
position:relative;
}

/* abstract shapes */

body::before,
body::after{
content:"";
position:absolute;
border-radius:50%;
opacity:0.2;
}

body::before{
width:500px;
height:500px;
background:#ffffff;
top:-100px;
left:-100px;
}

body::after{
width:400px;
height:400px;
background:#ffffff;
bottom:-80px;
right:-80px;
}

/* title */

.title{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:32px;
font-weight:bold;
color:#fff;
text-shadow:1px 1px 5px rgba(0,0,0,0.3);
z-index:10;
}

/* container */

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:25px;
padding:40px 30px;
width:700px;
color:#fff;
text-align:center;
position:relative;
margin-top:120px;
}

/* form title */

.form-title{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

/* inputs */

.input-group{
position:relative;
margin:15px 0;
}

.input-group input{
width:80%;
padding:12px 40px 12px 15px;
border-radius:20px;
border:none;
outline:none;
font-size:16px;
background:rgba(255,255,255,0.2);
color:#fff;
}

.input-group i{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
color:#fff;
cursor:pointer;
}

/* buttons */

.btns{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
flex-wrap:wrap;
}

button{
padding:12px 30px;
border-radius:25px;
border:none;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:linear-gradient(135deg,#ff7eb3,#ff758c);
color:#fff;
}

/* hide sections */

#signupForm,
#dashboard,
#adminPanel,
#addWorkForm{
display:none;
}

/* floating label */

.floating-label{
position:relative;
width:80%;
margin:15px auto;
}

.floating-label input{
width:100%;
padding:15px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.5);
background:rgba(255,255,255,0.2);
color:#fff;
}

.floating-label label{
position:absolute;
top:50%;
left:15px;
transform:translateY(-50%);
font-size:16px;
opacity:0.7;
}

.floating-label i{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

</style>
</head>

<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN -->

<div class="container" id="loginForm">

<h2 class="form-title">Login</h2>

<div class="input-group">
<input type="text" id="username" placeholder="Username">
<i class="fa fa-user"></i>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-eye" onclick="togglePassword('password',this)"></i>
</div>

<div class="btns">

<button onclick="login()">Login</button>

<button onclick="openSignup()">Signup</button>

<button onclick="openAdmin()">Admin</button>

<button onclick="openAddWork()">Add Work</button>

</div>

</div>

<!-- SIGNUP -->

<div class="container" id="signupForm">

<h2 class="form-title">Signup</h2>

<div class="input-group">
<input type="text" id="signupName" placeholder="Full Name">
</div>

<div class="input-group">
<input type="text" id="signupMobile" placeholder="Mobile">
</div>

<div class="input-group">
<input type="text" id="signupUsername" placeholder="Username">
</div>

<div class="input-group">
<input type="password" id="signupPassword" placeholder="Password">
<i class="fa fa-eye" onclick="togglePassword('signupPassword',this)"></i>
</div>

<div class="input-group">
<input type="password" id="signupConfirmPassword" placeholder="Confirm Password">
<i class="fa fa-eye" onclick="togglePassword('signupConfirmPassword',this)"></i>
</div>

<div class="btns">

<button onclick="signup()">Create Account</button>

<button onclick="backLogin()">Cancel</button>

</div>

</div>

<!-- DASHBOARD -->

<div class="container" id="dashboard">

<h2 class="form-title">Dashboard</h2>

<p id="dashboardName"></p>

<button onclick="logout()">Logout</button>

</div>

<!-- ADMIN -->

<div class="container" id="adminPanel">

<h2>Hello Admin</h2>

<button onclick="backLogin()">Back</button>

</div>

<!-- ADD WORKER -->

<div class="container" id="addWorkForm">

<h2 class="form-title">Add Worker</h2>

<div class="input-group">
<input type="text" id="workerName" placeholder="Full Name">
</div>

<div class="input-group">
<input type="text" id="fatherName" placeholder="Father Name">
</div>

<div class="floating-label">

<input type="text" id="dobText" placeholder=" " readonly onclick="openDOB()">

<label>Date of Birth</label>

<input type="date" id="dobPicker" style="display:none" onchange="setDOB()">

<i class="fa fa-calendar" onclick="openDOB()"></i>

</div>

<div class="input-group">
<input type="text" id="workerMobile" placeholder="Mobile">
</div>

<div class="input-group">
<input type="text" id="workerSkill" placeholder="Skill">
</div>

<div class="input-group">
<input type="text" id="workerLocation" placeholder="Location">
</div>

<div class="btns">

<button onclick="saveWorker()">Submit</button>

<button onclick="backLogin()">Back</button>

</div>

</div>

<script>

/* navigation */

function openSignup(){

loginForm.style.display="none"

signupForm.style.display="block"

}

function backLogin(){

loginForm.style.display="block"

signupForm.style.display="none"

dashboard.style.display="none"

adminPanel.style.display="none"

addWorkForm.style.display="none"

}

function openAdmin(){

loginForm.style.display="none"

adminPanel.style.display="block"

}

function openAddWork(){

loginForm.style.display="none"

addWorkForm.style.display="block"

}

/* signup */

function signup(){

let pass=signupPassword.value

let confirm=signupConfirmPassword.value

if(pass!=confirm){

alert("Password not match")

return

}

let users=JSON.parse(localStorage.getItem("users"))||[]

users.push({

name:signupName.value,

mobile:signupMobile.value,

username:signupUsername.value,

password:signupPassword.value

})

localStorage.setItem("users",JSON.stringify(users))

alert("Signup Successful")

backLogin()

}

/* login */

function login(){

let users=JSON.parse(localStorage.getItem("users"))||[]

let user=users.find(u=>u.username==username.value && u.password==password.value)

if(!user){

alert("Invalid Login")

return

}

loginForm.style.display="none"

dashboard.style.display="block"

dashboardName.innerText="Hello "+user.name

}

/* logout */

function logout(){

backLogin()

}

/* add worker */

function saveWorker(){

let workers=JSON.parse(localStorage.getItem("workers"))||[]

workers.push({

name:workerName.value,

mobile:workerMobile.value,

skill:workerSkill.value,

location:workerLocation.value,

dob:dobText.value

})

localStorage.setItem("workers",JSON.stringify(workers))

alert("Worker Added")

backLogin()

}

/* password toggle */

function togglePassword(id,icon){

let input=document.getElementById(id)

if(input.type==="password"){

input.type="text"

icon.classList.remove("fa-eye")

icon.classList.add("fa-eye-slash")

}else{

input.type="password"

icon.classList.remove("fa-eye-slash")

icon.classList.add("fa-eye")

}

}

/* DOB picker */

function openDOB(){

document.getElementById("dobPicker").showPicker()

}

function setDOB(){

let d=new Date(document.getElementById("dobPicker").value)

let day=("0"+d.getDate()).slice(-2)

let month=("0"+(d.getMonth()+1)).slice(-2)

let year=d.getFullYear()

document.getElementById("dobText").value=day+"/"+month+"/"+year

}

</script>

</body>
</html>
```
