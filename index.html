<!DOCTYPE html>
<html>
<head>
<title>Add Worker</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* CONTAINER */
.worker-container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:25px;
    width:700px;
    text-align:center;
    color:#fff;
}

/* INPUT GROUP */
.input-group{
    position:relative;
    margin:12px 0;
}

.input-group input{
    width:90%;
    padding:12px 40px 12px 15px;
    border:none;
    border-radius:20px;
    outline:none;
}

/* ICON */
.input-group i{
    position:absolute;
    right:5px;
    top:50%;
    transform:translateY(-50%);
    color:#888;
}

/* SELECT */
.worker-container select{
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:20px;
    outline:none;
    color:#888;
}

/* GENDER */
.gender-box{
    display:flex;
    justify-content:space-around;
    margin:15px 0;
}

.gender-option{
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
}

.gender-option input{
    display:none;
}

.radio-circle{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#fff;
    border:2px solid #ccc;
    position:relative;
}

.gender-option input:checked + .radio-circle::after{
    content:"";
    width:10px;
    height:10px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* BUTTONS */
.button-group{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

button{
    padding:10px 25px;
    border:none;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(135deg,#ff7eb3,#ff758c);
    color:#fff;
}

/* HIDDEN */
#vehicle_no{
    display:none;
}
</style>
</head>

<body>

<div class="worker-container">
    <h2>Add Worker</h2>

    <div class="input-group">
        <input type="text" id="worker_name" placeholder="Full Name">
        <i class="fa fa-user"></i>
    </div>

    <div class="input-group">
        <input type="text" id="worker_mobile" placeholder="Mobile Number">
        <i class="fa fa-phone"></i>
    </div>

    <!-- GENDER -->
    <div class="gender-box">
        <label class="gender-option">
            <input type="radio" name="gender" value="male">
            <span class="radio-circle"></span> Male
        </label>

        <label class="gender-option">
            <input type="radio" name="gender" value="female">
            <span class="radio-circle"></span> Female
        </label>

        <label class="gender-option">
            <input type="radio" name="gender" value="other">
            <span class="radio-circle"></span> Other
        </label>
    </div>

    <!-- TYPE -->
    <select id="worker_type" onchange="toggleFields()">
        <option value="">Select Type</option>
        <option value="worker">Worker</option>
        <option value="vehicle">Vehicle</option>
    </select>

    <!-- SKILL -->
    <select id="worker_skill">
        <option value="">Select Skill</option>
    </select>

    <!-- VEHICLE -->
    <input type="text" id="vehicle_no" placeholder="Vehicle Number">

    <!-- BUTTONS -->
    <div class="button-group">
        <button onclick="saveWorker()">Submit</button>
        <button onclick="resetForm()">Reset</button>
    </div>
</div>

<script>

/* TOGGLE */
function toggleFields(){
    let type = document.getElementById("worker_type").value;
    let skill = document.getElementById("worker_skill");
    let vehicle = document.getElementById("vehicle_no");

    skill.innerHTML = "<option value=''>Select</option>";

    if(type === "worker"){
        vehicle.style.display = "none";

        ["Labour","Helper","Mason","Electrician"].forEach(i=>{
            let opt = new Option(i,i);
            skill.add(opt);
        });
    }
    else if(type === "vehicle"){
        vehicle.style.display = "block";

        ["Bike","Car","Truck"].forEach(i=>{
            let opt = new Option(i,i);
            skill.add(opt);
        });
    }
}

/* SAVE */
function saveWorker(){
    let name = document.getElementById("worker_name").value;
    let mobile = document.getElementById("worker_mobile").value;
    let gender = document.querySelector('input[name="gender"]:checked');
    let type = document.getElementById("worker_type").value;

    if(!name || !mobile || !gender || !type){
        alert("Please fill all required fields");
        return;
    }

    let workers = JSON.parse(localStorage.getItem("workers")) || [];

    workers.push({
        name,
        mobile,
        gender: gender.value,
        type
    });

    localStorage.setItem("workers", JSON.stringify(workers));

    alert("Worker Saved Successfully");
}

/* RESET */
function resetForm(){
    location.reload();
}

</script>

</body>
</html>
