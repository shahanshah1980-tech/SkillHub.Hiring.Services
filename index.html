<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillHub Worker Registration</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: white;
}

.container {
    width: 700px;
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
}

input, select {
    width: 95%;
    height: 45px;
    margin: 10px 0;
    border-radius: 50px;
    border: none;
    padding: 0 15px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 50px;
    background: #ff758c;
    color: white;
    cursor: pointer;
}

/* DOCUMENT BOX */
.doc-box {
    background: rgba(255,255,255,0.15);
    padding: 15px;
    border-radius: 15px;
    margin-top: 10px;
}

/* ROW */
.doc-item {
    display: flex;
    justify-content: center; /* whole row center */
    align-items: center;
    background: rgba(0,0,0,0.2);
    padding: 6px 10px;
    margin: 6px 0;
    border-radius: 25px;
}

/* CENTER CONTENT */
.doc-left {
    display: flex;
    align-items: center;
    justify-content: center; /* center text + checkbox */
    gap: 10px;
}

/* TEXT */
.doc-left span {
    font-size: 14px;
}

/* CHECKBOX EXACT CENTER */
.doc-left input[type="checkbox"] {
    width: 18px;
    height: 18px;
    margin: 0;
}

/* STATUS TEXT */
.selected-text {
    display: none; /* optional hide (clean center look) */
}
</style>

</head>

<body>

<div class="container">

<h2 style="text-align:center;">Worker Registration</h2>

<h3>Documents</h3>

<div class="doc-box">

<label class="doc-item">
    <div class="doc-left">
        <span>Aadhar</span>
        <input type="checkbox">
    </div>
</label>

<label class="doc-item">
    <div class="doc-left">
        <span>Passport</span>
        <input type="checkbox">
    </div>
</label>

<label class="doc-item">
    <div class="doc-left">
        <span>Driving License</span>
        <input type="checkbox">
    </div>
</label>

</div>

</div>

</body>
</html>
