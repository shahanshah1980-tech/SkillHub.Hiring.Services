<!DOCTYPE html>
<html>
<head>
<title>SkillHub & Hiring Services</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    overflow: hidden;
}
.worker-container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:25px;
    width:700px;
    text-align:center;
    color:#fff;
    margin: 20px auto;
    height: 70vh;
    overflow-y: auto;
}
.input-group{
    position:relative;
    margin:12px 0;
}
.input-group input,
.input-group select,
#vehicle_number {
    width:98%;
    height:50px;
    padding:0 20px; 
    padding-right:45px; /* FIX */
    border:none;
    border-radius:50px; 
    outline:none;
    cursor: pointer;
    background:#fff;
    color:#888;
    font-size:16px !important;
    font-family:Arial !important;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    box-sizing: border-box; 
}

.input-group select.active {
    color: #000;
}
.input-group i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    color:#888;
    cursor: pointer;
}
.dropdown-row {
    display: flex;
    gap: 10px;
    width: 98%;
    max-width:98%;
    margin: 10px auto;
    align-items: center;
}
.dropdown-row > * {
    flex: 1;
    min-width: 0;
    height:50px;
    border-radius:50px;
    box-sizing: border-box;
    border:none;
}
#service_type1,
#vehicle_number {
    visibility: hidden;
}
.dropdown-row.show-all > * {
    flex: 1;
    visibility: visible;
}
.gender-box{
    display:flex;
    justify-content:space-around;
    margin:15px 0;
}
.gender-option{
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
}
.gender-option input{
    display:none;
}
.radio-circle{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#fff;
    border:2px solid #ccc;
    position:relative;
}
.gender-option input:checked + .radio-circle::after{
    content:"";
    width:10px;
    height:10px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}
.button-group{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}
button{
    padding:0 25px;
    height:50px;
    border:none;
    border-radius:50px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(135deg,#ff7eb3,#ff758c);
    color:#fff;
    box-sizing: border-box;
    font-size:16px;
    font-family:Arial;
}
input:focus,
select:focus {
    outline: none;
    box-shadow: none;
}

/* Custom ▼ arrow */
.input-group select,
.dropdown-row select {
    appearance: none !important;
    -webkit-appearance: none !important;
    -moz-appearance: none !important;
    padding-right: 45px;
    background-image: url("data:image/svg+xml;utf8,<svg fill='%23888' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><text x='2' y='15' font-size='14'>▼</text></svg>");
    background-repeat: no-repeat;
    background-position: right 15px center;
    background-size: 14px;
}
select::-ms-expand {
    display: none;
}

input,
select {
    font-size:16px !important;
    font-family:Arial !important;
}

/* FIX: placeholder color */
select option[value=""] {
    color:#888;
}
</style>
</head>

<body>

<h1 style="text-align:center; color:white; margin-top:20px; margin-bottom:20px;">SkillHub Hiring Services</h1>

<div class="worker-container">
    <h2>Add Worker</h2>

    <div class="input-group">
        <input type="text" id="worker_name" placeholder="Full Name">
        <i class="fa fa-user"></i>
    </div>
    
    <div class="input-group">
        <input type="text" id="worker_father" placeholder="Father Name">
        <i class="fa fa-user"></i>
    </div>

    <div class="input-group">
        <input type="text" id="worker_dob" placeholder="Date of Birth" readonly>
        <i class="fa fa-calendar" id="dob_icon"></i>
    </div>
    
    <div class="gender-box">
        <label class="gender-option">
            <input type="radio" name="gender" value="male">
            <span class="radio-circle"></span> Male
        </label>

        <label class="gender-option">
            <input type="radio" name="gender" value="female">
            <span class="radio-circle"></span> Female
        </label>

        <label class="gender-option">
            <input type="radio" name="gender" value="other">
            <span class="radio-circle"></span> Other
        </label>
    </div>
    
    <div class="input-group">
        <input type="text" id="worker_mobile" placeholder="Mobile Number">
        <i class="fa fa-phone"></i>
    </div> 

    <div class="input-group">
        <input type="email" id="worker_email" placeholder="Email Address">
        <i class="fa fa-envelope"></i>
    </div>

    <div class="input-group">
        <input type="text" id="worker_address" placeholder="Address">
        <i class="fa fa-home"></i>
    </div>
    
    <div class="dropdown-row" id="dropdownRow">
        <select id="service_type" onchange="toggleFields(); updateSelectColor(this)">
            <option value="" selected disabled> Select any one</option>
            <option value="worker">Worker</option>
            <option value="vehicle">Vehicle type</option>
        </select>

        <select id="service_type1" onchange="updateSelectColor(this)">
            <option value="" selected disabled> Select any one</option>
        </select>

        <input type="text" id="vehicle_number" placeholder="Vehicle No">
    </div>

    <div class="input-group" style="display:flex; justify-content:flex-start; margin-left:5px;">
        <select id="id_proof" onchange="updateSelectColor(this)" style="width:32%; padding:5px; margin-left:5px;">
            <option value="" selected disabled> Select any one</option>
            <option value="Adharcard">Adhar Card</option>
            <option value="Passport">Passport</option>
            <option value="DL">DL</option>
        </select>
    </div>

    <div class="button-group">
        <button onclick="saveWorker()">Submit</button>
        <button onclick="resetForm()">Reset</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
function updateSelectColor(el){
    if(el.value === ""){ 
        el.classList.remove("active"); 
        el.style.color = "#888";
    } else { 
        el.classList.add("active"); 
        el.style.color = "#000";
    }
}

function toggleFields(){
    let type = document.getElementById("service_type").value;
    let skill = document.getElementById("service_type1");
    let vehicle = document.getElementById("vehicle_number");
    let row = document.getElementById("dropdownRow");

    skill.innerHTML = "<option value='' selected disabled> Select any one</option>";
    row.classList.remove("show-all");

    if(type === "worker"){
        skill.style.visibility = "visible";
        vehicle.style.visibility = "hidden";

        [
        "Labour","Helper","Mason","Steel Fixer","Shuttering Carpenter",
        "Carpenter","Wood Carpenter","Furniture Carpenter","Interior Carpenter",
        "Tile Fixer","Marble Fixer","Granite Fixer","Wall Painter","Spray Painter",
        "POP Worker","Plaster Worker","Gypsum Worker","False Ceiling Worker",
        "Waterproofing Worker","Roofing Worker","Demolition Worker","Electrician",
        "Industrial Electrician","AC Mechanic","AC Technician","Refrigerator Mechanic",
        "Washing Machine Mechanic","Generator Mechanic","Lift Technician","Pump Mechanic",
        "Motor Winder","PC Mechanic","Laptop Mechanic","Computer Hardware Technician",
        "Printer Technician","CCTV Technician","Network Technician","Mobile Repair Technician",
        "LED TV Technician","Solar Technician","Welder","Gas Welder","Arc Welder",
        "Steel Fabricator","Aluminium Fabricator","Iron Worker","Grill Maker",
        "Gate Fabricator","Plumber","Pipe Fitter","Sanitary Fitter","Water Tank Cleaner",
        "Drainage Worker","Furniture Maker","Wood Polisher","Modular Kitchen Installer",
        "Curtain Fitter","Wallpaper Installer","Glass Fitter","Door Window Fitter",
        "Gardener","Landscaper","Pest Control Worker","Cleaning Worker","House Keeping",
        "Security Helper"
        ].forEach(i=>{ skill.add(new Option(i,i)); });
    }
    else if(type === "vehicle"){
        skill.style.visibility = "visible";
        vehicle.style.visibility = "visible";
        row.classList.add("show-all");

        [
        "Bike","Scooter","Auto Rickshaw","E-Rickshaw","Tempo","Pickup",
        "Mini Truck","Truck","Taxi","Cab","Van","Bus","School Bus",
        "Tourist Bus","Ambulance","Tractor","JCB","Crane","Loader","Dumper"
        ].forEach(i=>{ skill.add(new Option(i,i)); });
    }
    else{
        skill.style.visibility = "hidden";
        vehicle.style.visibility = "hidden";
    }

    updateSelectColor(skill);
}

function saveWorker(){
    let name = document.getElementById("worker_name").value;
    let mobile = document.getElementById("worker_mobile").value;
    let gender = document.querySelector('input[name="gender"]:checked');
    let type = document.getElementById("service_type").value;

    if(!name || !mobile || !gender || !type){ alert("Please fill all required fields"); return; }

    let workers = JSON.parse(localStorage.getItem("workers")) || [];
    workers.push({ name, mobile, gender: gender.value, type });
    localStorage.setItem("workers", JSON.stringify(workers));

    alert("Worker Saved Successfully");
}

function resetForm(){ location.reload(); }

const currentYear = new Date().getFullYear();
flatpickr("#worker_dob", {
    clickOpens: false,
    dateFormat: "d/m/Y",
    minDate: new Date(currentYear - 100,0,1),
    maxDate: new Date(currentYear + 100,11,31),
    disableMobile: true
});

document.getElementById("dob_icon").addEventListener("click", function(){
    document.getElementById("worker_dob")._flatpickr.open();
});

document.querySelectorAll('select').forEach(sel => {
    updateSelectColor(sel);
    sel.addEventListener('change', function() {
        updateSelectColor(sel);
    });
});
</script>

</body>
</html>
