<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillHub & Hiring Services</title>

<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: white;
}

.container {
    width: 700px;
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
}

input, select {
    width: 95%;
    height: 45px;
    margin: 10px 0;
    border-radius: 50px;
    border: none;
    padding: 0 15px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 50px;
    background: #ff758c;
    color: white;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: white;
    color: black;
}

th, td {
    border: 1px solid black;
    padding: 8px;
    text-align: center;
}

#cv { display: none; }
</style>

</head>

<body>

<div class="container">

<h2>Worker Registration</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="dob" placeholder="Date of Birth">

<input type="text" id="mobile" placeholder="Mobile Number">
<input type="email" id="email" placeholder="Email">
<input type="text" id="address" placeholder="Address">

<select id="type" onchange="loadOptions()">
<option value="">Select Type</option>
<option value="worker">Worker</option>
<option value="vehicle">Vehicle</option>
</select>

<select id="subtype"></select>

<input type="file" id="cv">

<br><br>

<button onclick="save()">Submit</button>

<h2>Saved Data</h2>
<table>
<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>Type</th>
<th>SubType</th>
<th>File</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>

</div>

<script>

function loadOptions(){
    let type = document.getElementById("type").value;
    let sub = document.getElementById("subtype");

    sub.innerHTML = "";

    if(type === "worker"){
        ["Labour","Helper","Mason"].forEach(i => sub.add(new Option(i,i)));
    } else if(type === "vehicle"){
        ["Bike","Car","Truck"].forEach(i => sub.add(new Option(i,i)));
    }
}

function save(){

    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let subtype = document.getElementById("subtype").value;
    let type = document.getElementById("type").value;

    let fileInput = document.getElementById("cv");
    let file = fileInput.files[0];

    if(!name || !mobile){
        alert("Fill required fields");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    function finalSave(fileData){

        users.push({
            name,
            mobile,
            type,
            subtype,
            file: fileData
        });

        localStorage.setItem("users", JSON.stringify(users));

        loadTable();   // 🔥 important
        resetForm();

        alert("Saved Successfully");
    }

    if(file){
        let reader = new FileReader();
        reader.onload = e => finalSave(e.target.result);
        reader.readAsDataURL(file);
    } else {
        finalSave("");
    }
}

function loadTable(){

    let users = JSON.parse(localStorage.getItem("users")) || [];
    let tbody = document.getElementById("tableData");

    tbody.innerHTML = "";

    users.forEach(u => {
        let row = `<tr>
            <td>${u.name}</td>
            <td>${u.mobile}</td>
            <td>${u.type}</td>
            <td>${u.subtype}</td>
            <td>${u.file ? "Uploaded" : "No File"}</td>
        </tr>`;

        tbody.innerHTML += row;
    });
}

function resetForm(){
    document.getElementById("name").value = "";
    document.getElementById("father").value = "";
    document.getElementById("dob").value = "";
    document.getElementById("mobile").value = "";
    document.getElementById("email").value = "";
    document.getElementById("address").value = "";
    document.getElementById("cv").value = "";
}

window.onload = loadTable;

</script>

</body>
</html>
