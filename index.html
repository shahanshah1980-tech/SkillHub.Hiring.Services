<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    overflow:auto;
    padding-top:120px;
}
.title{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    color:#fff;
    font-weight:bold;
}
.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px 20px;
    width:700px;
    color:#fff;
    text-align:center;
    margin-bottom:50px;
}
.form-title{font-size:22px; font-weight:bold; margin-bottom:20px;}
.input-group{position:relative; margin:12px 0;}
.input-group input, .input-group select{
    width:90%;
    padding:12px 35px;
    border-radius:20px;
    border:none;
    outline:none;
    font-size:16px;
    background:#fff;
    color:#000;
}
.input-group i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}
.btns{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:15px;
    flex-wrap:wrap;
}
button{
    padding:10px 25px;
    border-radius:25px;
    border:none;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
    background:linear-gradient(135deg,#ff7eb3,#ff758c);
    color:#fff;
}
#signupForm, #dashboard, #adminPanel, #addWorkForm{display:none;}
#addWorkForm{max-height:70vh; overflow-y:auto;}

.input-group.radio-group{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:93%;
    margin:20px auto;
}
.gender-option{display:flex; align-items:center; gap:10px; cursor:pointer;}
.gender-option input{display:none;}
.radio-circle{
    width:26px;
    height:26px;
    border-radius:50%;
    background:#fff;
    border:3px solid #e0e0e0;
    position:relative;
}
.gender-option input:checked + .radio-circle::after{
    content:"";
    width:12px;
    height:12px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.dropdown-row {
    display: flex;
    gap: 10px;
    width: 95%;
    margin: 10px auto;
    align-items: center;
}
.dropdown-row > * { flex: 1; }
.dropdown-row select,
.dropdown-row input {
    padding: 12px;
    border-radius: 20px;
    border: none;
    font-size: 16px;
    background: #fff;
}
#service_type1, #vehicle_number{visibility:hidden;}
</style>
</head>

<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN -->
<div class="container" id="loginForm">
    <h2 class="form-title">Login</h2>
    <div class="input-group">
        <input type="text" id="login_username" placeholder="Username">
        <i class="fa fa-user"></i>
    </div>
    <div class="input-group">
        <input type="password" id="login_password" placeholder="Password">
        <i class="fa fa-eye" onclick="app_togglePassword('login_password',this)"></i>
    </div>
    <div class="btns">
        <button onclick="login_start()">Login</button>
        <button onclick="openSignup()">Signup</button>
        <button onclick="openAddWork()">Add Worker</button>
    </div>
</div>

<!-- SIGNUP -->
<div class="container" id="signupForm">
    <h2 class="form-title">Signup</h2>
    <div class="input-group"><input type="text" id="signupName" placeholder="Full Name"></div>
    <div class="input-group"><input type="text" id="signupMobile" placeholder="Mobile Number"></div>
    <div class="input-group"><input type="text" id="signupUsername" placeholder="Username"></div>
    <div class="input-group">
        <input type="password" id="signup_password" placeholder="Password">
        <i class="fa fa-eye" onclick="app_togglePassword('signup_password',this)"></i>
    </div>
    <div class="input-group">
        <input type="password" id="signup_confirmPassword" placeholder="Confirm Password">
        <i class="fa fa-eye" onclick="app_togglePassword('signup_confirmPassword',this)"></i>
    </div>
    <div class="btns">
        <button onclick="signup_start()">Create Account</button>
        <button onclick="backLogin()">Cancel</button>
    </div>
</div>

<!-- ADD WORKER -->
<div class="container" id="addWorkForm">
    <h2 class="form-title">Add Worker</h2>

    <div class="input-group"><input type="text" id="worker_name" placeholder="Full Name"></div>
    <div class="input-group"><input type="text" id="worker_dob" placeholder="Date of Birth"></div>

    <!-- GENDER -->
    <div class="input-group radio-group">
        <label class="gender-option">
            <input type="radio" name="worker_gender" value="male">
            <span class="radio-circle"></span> Male
        </label>
        <label class="gender-option">
            <input type="radio" name="worker_gender" value="female">
            <span class="radio-circle"></span> Female
        </label>
        <label class="gender-option">
            <input type="radio" name="worker_gender" value="other">
            <span class="radio-circle"></span> Other
        </label>
    </div>

    <div class="input-group"><input type="text" id="worker_mobile" placeholder="Mobile Number"></div>

    <div class="dropdown-row">
        <select id="main_type" onchange="toggleWorkerFields()">
            <option value="">Select Any One</option>
            <option value="workers">Workers</option>
            <option value="vehicle">Vehicle Type</option>
        </select>

        <select id="service_type1"></select>
        <input type="text" id="vehicle_number" placeholder="Vehicle Number">
    </div>

    <div class="btns">
        <button onclick="sendWorkerOTP()">Send OTP</button>
        <button onclick="worker_save()">Submit Worker</button>
        <button onclick="backLogin()">Back</button>
    </div>
</div>

<script>

/* 🔐 ULTRAMSG */
var token = "1xhtdh7bylh73iay";
var instance = "instance164778";

/* PASSWORD */
function app_togglePassword(id,icon){
    var input=document.getElementById(id);
    if(input.type==="password"){
        input.type="text";
        icon.classList.replace("fa-eye","fa-eye-slash");
    } else {
        input.type="password";
        icon.classList.replace("fa-eye-slash","fa-eye");
    }
}

/* DROPDOWN */
function toggleWorkerFields(){
    var mainType=document.getElementById("main_type").value;
    var skill=document.getElementById("service_type1");
    var vehicle=document.getElementById("vehicle_number");

    skill.innerHTML="";

    if(mainType==="workers"){
        skill.style.visibility="visible";
        vehicle.style.visibility="hidden";

        var list=["Labour","Helper","Mason","Electrician","Plumber"];

        skill.innerHTML="<option value=''>Select Any One</option>";
        list.forEach(i=>{
            var opt=document.createElement("option");
            opt.value=i;
            opt.text=i;
            skill.appendChild(opt);
        });
    }
    else if(mainType==="vehicle"){
        skill.style.visibility="visible";
        vehicle.style.visibility="visible";

        var list=["Bike","Car","Truck","Bus"];

        skill.innerHTML="<option value=''>Vehicle Type</option>";
        list.forEach(i=>{
            var opt=document.createElement("option");
            opt.value=i;
            opt.text=i;
            skill.appendChild(opt);
        });
    }
    else{
        skill.style.visibility="hidden";
        vehicle.style.visibility="hidden";
    }
}

/* DATE */
flatpickr("#worker_dob",{dateFormat:"d/m/Y"});
window.onload=toggleWorkerFields;

/* OTP SEND */
function sendWorkerOTP(){
    var number=document.getElementById("worker_mobile").value;
    if(!number){ alert("Enter Mobile"); return; }

    var otp=Math.floor(100000+Math.random()*900000);
    localStorage.setItem("otp",otp);

    var msg="Your OTP is: "+otp;

    fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            token:token,
            to:number,
            body:msg
        })
    });

    alert("OTP Sent!");
}

/* SAVE */
function worker_save(){

    var name=document.getElementById("worker_name").value;
    var mobile=document.getElementById("worker_mobile").value;
    var gender=document.querySelector('input[name="worker_gender"]:checked');

    if(!name){alert("Enter Name");return;}
    if(!mobile){alert("Enter Mobile");return;}
    if(!gender){alert("Select Gender");return;}

    var data={
        name:name,
        mobile:mobile,
        gender:gender.value
    };

    var list=JSON.parse(localStorage.getItem("workers"))||[];
    list.push(data);
    localStorage.setItem("workers",JSON.stringify(list));

    alert("Worker Saved!");
    resetForm();
}

/* RESET */
function resetForm(){
    document.querySelectorAll("input").forEach(i=>i.value="");
    document.querySelectorAll('input[name="worker_gender"]').forEach(r=>r.checked=false);
    document.getElementById("main_type").selectedIndex=0;
    toggleWorkerFields();
}

/* NAV */
function hideAll(){document.querySelectorAll(".container").forEach(f=>f.style.display="none");}
function openSignup(){hideAll(); signupForm.style.display="block";}
function openAddWork(){hideAll(); addWorkForm.style.display="block";}
function backLogin(){hideAll(); loginForm.style.display="block"; resetForm();}

function login_start(){alert("Login Pending");}
function signup_start(){alert("Signup Pending");}

</script>

</body>
</html>
