<!DOCTYPE html>
<html>
<head>
<title>SkillHub & Hiring Services</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    overflow: hidden;
}
.worker-container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:25px;
    width:700px;
    text-align:center;
    color:#fff;
    margin: 20px auto;
    height: 70vh;
    overflow-y: auto;
}
.input-group{
    position:relative;
    margin:12px 0;
}

/* ✅ FONT FIX APPLIED HERE */
input,
select,
#service_type,
#service_type1,
#vehicle_number {
    width:98%;
    height:50px;
    padding:0 15px; 
    border:none;
    border-radius:50px; 
    outline:none;
    cursor: pointer;
    background:#fff;
    color:#888;
    font-size:16px !important;
    font-family:Arial !important;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    box-sizing: border-box; 
}

.input-group select.active {
    color: #000;
}
.input-group i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    color:#888;
    cursor: pointer;
}
.dropdown-row {
    display: flex;
    gap: 10px;
    width: 98%;
    max-width:98%;
    margin: 10px auto;
    align-items: center;
}
.dropdown-row > * {
    flex: 1;
    min-width: 0;
    height:50px;
    border-radius:50px;
    box-sizing: border-box;
    border:none;
}
#service_type1,
#vehicle_number {
    visibility: hidden;
}
.dropdown-row.show-all > * {
    flex: 1;
    visibility: visible;
}
.gender-box{
    display:flex;
    justify-content:space-around;
    margin:15px 0;
}
.gender-option{
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
}
.gender-option input{
    display:none;
}
.radio-circle{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#fff;
    border:2px solid #ccc;
    position:relative;
}
.gender-option input:checked + .radio-circle::after{
    content:"";
    width:10px;
    height:10px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}
.button-group{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}
button{
    padding:0 25px;
    height:50px;
    border:none;
    border-radius:50px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(135deg,#ff7eb3,#ff758c);
    color:#fff;
    box-sizing: border-box;
    font-size:16px;
    font-family:Arial;
}
input:focus,
select:focus {
    outline: none;
    box-shadow: none;
}

/* Custom ▼ arrow */
.input-group select,
.dropdown-row select {
    appearance: none !important;
    -webkit-appearance: none !important;
    -moz-appearance: none !important;
    padding-right: 35px;
    background-image: url("data:image/svg+xml;utf8,<svg fill='%23888' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><text x='2' y='15' font-size='14'>▼</text></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 14px;
}
select::-ms-expand {
    display: none;
}
</style>
</head>

<body>

<h1 style="text-align:center; color:white; margin-top:20px; margin-bottom:20px;">SkillHub Hiring Services</h1>

<div class="worker-container">
    <h2>Add Worker</h2>

    <div class="input-group">
        <input type="text" id="worker_name" placeholder="Full Name">
        <i class="fa fa-user"></i>
    </div>
    
    <div class="input-group">
        <input type="text" id="worker_father" placeholder="Father Name">
        <i class="fa fa-user"></i>
    </div>

    <div class="input-group">
        <input type="text" id="worker_dob" placeholder="Date of Birth" readonly>
        <i class="fa fa-calendar" id="dob_icon"></i>
    </div>
    
    <div class="gender-box">
        <label class="gender-option">
            <input type="radio" name="gender" value="male">
            <span class="radio-circle"></span> Male
        </label>

        <label class="gender-option">
            <input type="radio" name="gender" value="female">
            <span class="radio-circle"></span> Female
        </label>

        <label class="gender-option">
            <input type="radio" name="gender" value="other">
            <span class="radio-circle"></span> Other
        </label>
    </div>
    
    <div class="input-group">
        <input type="text" id="worker_mobile" placeholder="Mobile Number">
        <i class="fa fa-phone"></i>
    </div> 

    <div class="input-group">
        <input type="email" id="worker_email" placeholder="Email Address">
        <i class="fa fa-envelope"></i>
    </div>

    <div class="input-group">
        <input type="text" id="worker_address" placeholder="Address">
        <i class="fa fa-home"></i>
    </div>
    
    <div class="dropdown-row" id="dropdownRow">
        <select id="service_type" onchange="toggleFields(); updateSelectColor(this)">
            <option value="" selected>Select any one</option>
            <option value="worker">Worker</option>
            <option value="vehicle">Vehicle type</option>
        </select>

        <select id="service_type1" onchange="updateSelectColor(this)">
            <option value="" selected>Select any one</option>
        </select>

        <input type="text" id="vehicle_number" placeholder="Vehicle No">
    </div>

</div>

</body>
</html>
