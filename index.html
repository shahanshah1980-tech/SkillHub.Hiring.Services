<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    overflow:auto;
    padding-top:120px;
}
.title{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    color:#fff;
    font-weight:bold;
}
.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px 20px;
    width:700px;
    color:#fff;
    text-align:center;
    margin-bottom:50px;
}
.form-title{font-size:22px; font-weight:bold; margin-bottom:20px;}
.input-group{position:relative; margin:12px 0;}
.input-group input, .input-group select{
    width:90%;
    padding:12px 35px;
    border-radius:20px;
    border:none;
    outline:none;
    font-size:16px;
    background:#fff;
    color:#000;
}
.input-group i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#000;
}
.btns{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:15px;
    flex-wrap:wrap;
}
button{
    padding:10px 25px;
    border-radius:25px;
    border:none;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
    background:linear-gradient(135deg,#ff7eb3,#ff758c);
    color:#fff;
}
#signupForm, #dashboard, #adminPanel, #addWorkForm{display:none;}
#addWorkForm{max-height:70vh; overflow-y:auto;}

.input-group.radio-group{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:93%;
    margin:20px auto;
}
.gender-option{display:flex; align-items:center; gap:10px; cursor:pointer;}
.gender-option input{display:none;}
.radio-circle{
    width:26px;
    height:26px;
    border-radius:50%;
    background:#fff;
    border:3px solid #e0e0e0;
    position:relative;
}
.gender-option input:checked + .radio-circle::after{
    content:"";
    width:12px;
    height:12px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.dropdown-row {
    display: flex;
    gap: 10px;
    width: 95%;
    margin: 10px auto;
    align-items: center;
}
.dropdown-row > * { flex: 1; }
.dropdown-row select,
.dropdown-row input {
    padding: 12px;
    border-radius: 20px;
    border: none;
    font-size: 16px;
    background: #fff;
}
#service_type1, #vehicle_number{visibility:hidden;}
</style>
</head>

<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN -->
<div class="container" id="loginForm">
    <h2 class="form-title">Login</h2>
    <div class="input-group">
        <input type="text" id="login_username" placeholder="Username">
        <i class="fa fa-user"></i>
    </div>
    <div class="input-group">
        <input type="password" id="login_password" placeholder="Password">
        <i class="fa fa-eye" onclick="app_togglePassword('login_password',this)"></i>
    </div>
    <div class="btns">
        <button onclick="login_start()">Login</button>
        <button onclick="openSignup()">Signup</button>
        <button onclick="openAdmin()">Admin</button>
        <button onclick="openAddWork()">Add Worker</button>
    </div>
</div>

<!-- SIGNUP -->
<div class="container" id="signupForm">
    <h2 class="form-title">Signup</h2>
    <div class="input-group"><input type="text" id="signupName" placeholder="Full Name"></div>
    <div class="input-group"><input type="text" id="signupMobile" placeholder="Mobile Number"></div>
    <div class="input-group"><input type="text" id="signupUsername" placeholder="Username"></div>
    <div class="input-group">
        <input type="password" id="signup_password" placeholder="Password">
        <i class="fa fa-eye" onclick="app_togglePassword('signup_password',this)"></i>
    </div>
    <div class="input-group">
        <input type="password" id="signup_confirmPassword" placeholder="Confirm Password">
        <i class="fa fa-eye" onclick="app_togglePassword('signup_confirmPassword',this)"></i>
    </div>
    <div class="btns">
        <button onclick="signup_start()">Create Account</button>
        <button onclick="backLogin()">Cancel</button>
    </div>
</div>

<!-- ADD WORKER -->
<div class="container" id="addWorkForm">
    <h2 class="form-title">Add Worker</h2>

    <div class="input-group"><input type="text" id="worker_name" placeholder="Full Name"></div>
    <div class="input-group"><input type="text" id="worker_father" placeholder="Father Name"></div>
    <div class="input-group"><input type="text" id="worker_dob" placeholder="Date of Birth"></div>

    <div class="input-group"><input type="text" id="worker_mobile" placeholder="Mobile Number"></div>

    <div class="dropdown-row">
        <select id="main_type" onchange="toggleWorkerFields()">
            <option value="">Select Any One</option>
            <option value="workers">Workers</option>
            <option value="vehicle">Vehicle Type</option>
        </select>

        <select id="service_type1"></select>
        <input type="text" id="vehicle_number" placeholder="Vehicle Number">
    </div>

    <div class="btns">
        <button onclick="worker_save()">Submit Worker</button>
        <button onclick="backLogin()">Back</button>
    </div>
</div>

<script>
function app_togglePassword(id,icon){
    var input=document.getElementById(id);
    if(input.type==="password"){
        input.type="text";
        icon.classList.replace("fa-eye","fa-eye-slash");
    } else {
        input.type="password";
        icon.classList.replace("fa-eye-slash","fa-eye");
    }
}

/* FIXED FUNCTION */
function toggleWorkerFields(){
    var mainType=document.getElementById("main_type").value;
    var skillDropdown=document.getElementById("service_type1");
    var vehicleBox=document.getElementById("vehicle_number");

    skillDropdown.innerHTML="";

    if(mainType==="workers"){
        skillDropdown.style.visibility="visible";
        vehicleBox.style.visibility="hidden";

        var workers=["Labour","Helper","Mason","Electrician","Plumber"];

        skillDropdown.innerHTML="<option value=''>Select Any One</option>";
        workers.forEach(function(item){
            var option=document.createElement("option");
            option.value=item;
            option.text=item;
            skillDropdown.appendChild(option);
        });
    }
    else if(mainType==="vehicle"){
        skillDropdown.style.visibility="visible";
        vehicleBox.style.visibility="visible";

        var vehicles=["Bike","Car","Truck","Bus"];

        skillDropdown.innerHTML="<option value=''>Select Vehicle Type</option>";
        vehicles.forEach(function(item){
            var option=document.createElement("option");
            option.value=item;
            option.text=item;
            skillDropdown.appendChild(option);
        });
    }
    else{
        skillDropdown.style.visibility="hidden";
        vehicleBox.style.visibility="hidden";
    }
}

flatpickr("#worker_dob",{dateFormat:"d/m/Y"});

window.onload=toggleWorkerFields;

function hideAllForms(){
    document.querySelectorAll(".container").forEach(f=>f.style.display="none");
}
function openSignup(){hideAllForms(); signupForm.style.display="block";}
function openAddWork(){hideAllForms(); addWorkForm.style.display="block";}
function openAdmin(){hideAllForms(); adminPanel.style.display="block";}
function backLogin(){hideAllForms(); loginForm.style.display="block";}
function worker_save(){alert("Worker Saved!");}
</script>

</body>
</html>
