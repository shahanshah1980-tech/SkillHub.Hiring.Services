<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillHub & Hiring Services</title>

<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: white;
    overflow: hidden;
}

.container {
    width: 700px;
    height: 70vh;
    overflow-y: auto;
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
}
h2 {
    width: 100%;
    text-align: center;
}
h2, h3 {
    margin-top: 15px;
}

input, select {
    width: 95%;
    height: 45px;
    margin: 10px 0;
    border-radius: 50px;
    border: none;
    padding: 0 15px;
}

.gender-box {
    display: flex;
    gap: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 50px;
    background: #ff758c;
    color: white;
    cursor: pointer;
}

button.file-btn {
    background: #6c757d !important;
}

.upload-row {
    display: flex;
    align-items: center;
    gap: 15px;
    flex-wrap: nowrap;
    font-size: 24px;
    font-weight: bold;
}

#fileName {
    font-size: 14px;
    max-width: 200px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}

.service-row {
    display: flex;
    gap: 5px;
    align-items: center;
}

.service-row select,
.service-row .vehicle-box {
    flex: 1;
}

.vehicle-box input {
    width: 85%;
}

.doc-box {
    background: rgba(255,255,255,0.15);
    padding: 15px;
    border-radius: 15px;
}

.doc-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.2);
    padding: 2px 10px;
    margin: 3px 0;
    border-radius: 25px;
    height: 28px;
    position: relative;
}

.doc-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.doc-left input[type="checkbox"] {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 16px;
    height: 16px;
    margin: 0;
}

.selected-text {
    min-width: 80px;
    text-align: right;
    font-size: 12px;
}

#cv {
    display: none;
}

#dob {
    display: block;
    margin-left: auto;
}
</style>

</head>

<body>

<h1 style="text-align:center; margin-top:20px; margin-bottom:0;">
SkillHub &amp; Hiring Services
</h1>

<div class="container">
<form id="myForm">

<h2 style="width:100%; text-align:center;">Worker Registration</h2>

<h3>Personal Details</h3>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="dob" placeholder="Date of Birth">

<div class="gender-box">
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Other"> Other</label>
</div>

<h3>Contact Details</h3>

<input type="text" id="mobile" placeholder="Mobile Number" maxlength="10"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">
<input type="email" id="email" placeholder="Email">
<input type="text" id="address" placeholder="Address">

<h3>Service Details</h3>

<div class="service-row">

<select id="type" onchange="loadOptions()">
<option value="">Select Type</option>
<option value="worker">Worker</option>
<option value="vehicle">Vehicle</option>
</select>

<select id="subtype"></select>

<div id="vehicleBox" class="vehicle-box" style="display:none;">
<input type="text" placeholder="Vehicle Number">
</div>

</div>

<h3>Documents</h3>

<div class="doc-box">

<label class="doc-item">
    <div class="doc-left">
        <span>Aadhar</span>
        <input type="checkbox">
    </div>
    <span class="selected-text"></span>
</label>

<label class="doc-item">
    <div class="doc-left">
        <span>Passport</span>
        <input type="checkbox">
    </div>
    <span class="selected-text"></span>
</label>

<label class="doc-item">
    <div class="doc-left">
        <span>Driving License</span>
        <input type="checkbox">
    </div>
    <span class="selected-text"></span>
</label>

<label class="doc-item">
    <div class="doc-left">
        <span>Photo</span>
        <input type="checkbox">
    </div>
    <span class="selected-text"></span>
</label>

</div>

<h3 class="upload-row">
Upload CV
<button type="button" id="fileBtn" class="file-btn" onclick="handleFile()">Choose File</button>
<span id="fileName"></span>
</h3>

<input type="file" id="cv" onchange="updateButton()">

<br><br>

<button type="button" onclick="save()">Submit</button>
<button type="button" onclick="resetForm()">Reset</button>

</form>
</div>

<script>

$("#dob").datepicker({
    changeMonth: true,
    changeYear: true,
    yearRange: "1900:2100",
    dateFormat: "dd/mm/yy",
    defaultDate: new Date(),

    onSelect: function(dateText, inst) {
        let focusable = Array.from(
            document.querySelectorAll("input, select, button")
        ).filter(el => el.offsetParent !== null && !el.disabled);

        let index = focusable.indexOf(document.getElementById("dob"));

        if (index > -1 && index < focusable.length - 1) {
            focusable[index + 1].focus();
        }
    },

    // ✅ Right side open
beforeShow: function(input, inst) {
    setTimeout(function() {
        let $input = $(input);
        let $dp = inst.dpDiv;

        let leftPos = $input.offset().left + $input.outerWidth() + 10;
        let topPos = $input.offset().top + $input.outerHeight();

        // Form ke boundary ke andar rakho
        let container = $(".container");
        let containerRight = container.offset().left + container.outerWidth();

        // Agar right me space nahi hai to left me shift
        if (leftPos + $dp.outerWidth() > containerRight) {
            leftPos = $input.offset().left - $dp.outerWidth() - 10;
        }

        $dp.css({
            top: topPos,
            left: leftPos
        });
    }, 0);
}

document.querySelectorAll(".doc-item input").forEach(cb => {
    cb.addEventListener("change", function() {
        let text = this.closest(".doc-item").querySelector(".selected-text");
        text.innerText = this.checked ? "(Selected)" : "";
    });
});

function loadOptions() {
    let type = document.getElementById("type").value;
    let sub = document.getElementById("subtype");
    let vehicleBox = document.getElementById("vehicleBox");

    sub.innerHTML = "<option>Select Option</option>";

    let workerList = ["Labour","Helper","Mason","Carpenter","Electrician"];
    let vehicleList = ["Bike","Car","Truck","Bus"];

    if(type === "worker"){
        vehicleBox.style.display = "none";
        workerList.forEach(i => sub.add(new Option(i,i)));
    }
    else if(type === "vehicle"){
        vehicleBox.style.display = "block";
        vehicleList.forEach(i => sub.add(new Option(i,i)));
    }
}

function updateButton(){
    let file = document.getElementById("cv");
    let btn = document.getElementById("fileBtn");
    let nameText = document.getElementById("fileName");

    if(file.files.length){
        btn.innerText = "View File";
        nameText.innerText = file.files[0].name;
    } else {
        btn.innerText = "Choose File";
        nameText.innerText = "";
    }
}

function handleFile(){
    let file = document.getElementById("cv");

    if(!file.files.length){
        file.click();
    } else {
        window.open(URL.createObjectURL(file.files[0]));
    }
}

function save(){
    let name = document.getElementById("name").value.trim();
    let father = document.getElementById("father").value.trim();
    let dob = document.getElementById("dob").value;
    let gender = document.querySelector('input[name="gender"]:checked');
    let mobile = document.getElementById("mobile").value.trim();
    let email = document.getElementById("email").value.trim();
    let address = document.getElementById("address").value.trim();

    if(!name || !father || !dob || !gender || !mobile){
        alert("⚠ Fill all required fields");
        return;
    }

    if(!/^\d{10}$/.test(mobile)){
        alert("⚠ Enter valid 10 digit mobile number");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    if(users.some(u => u.mobile === mobile)){
        alert("⚠ Mobile number already registered!");
        return;
    }

    if(email && users.some(u => u.email === email)){
        alert("⚠ Email already registered!");
        return;
    }

    let userData = {
        name, father, dob,
        gender: gender.value,
        mobile, email, address,
        username: mobile,
        password: mobile
    };

    users.push(userData);
    localStorage.setItem("users", JSON.stringify(users));

    alert("✅ Saved Successfully");

    document.getElementById("myForm").reset();
    document.getElementById("fileName").innerText = "";
    document.getElementById("fileBtn").innerText = "Choose File";
}

function resetForm(){
    location.reload();
}

</script>

</body>
</html>
