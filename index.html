<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<!-- Font Awesome for icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<!-- Flatpickr CSS for date picker -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<!-- Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
/* --- Keep your existing CSS as-is --- */
body{margin:0;font-family:Arial;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#00c6ff,#0072ff);overflow:hidden;position:relative;}
body::before, body::after{content:"";position:absolute;border-radius:50%;opacity:0.2;}
body::before{width:500px;height:500px;background:#fff;top:-100px;left:-100px;}
body::after{width:400px;height:400px;background:#fff;bottom:-80px;right:-80px;}
.title{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:bold;color:#fff;text-shadow:1px 1px 5px rgba(0,0,0,0.3);}
.container{background:rgba(255,255,255,0.15);backdrop-filter:blur(15px);border-radius:25px;padding:40px 30px;width:700px;color:#fff;text-align:center;margin-top:120px;}
.form-title{font-size:24px;font-weight:bold;margin-bottom:20px;}
.input-group{position:relative;margin:15px 0;}
.input-group input, .input-group select{width:90%;padding:12px 40px 12px 25px;border-radius:20px;border:none;outline:none;font-size:16px;background:#fff;color:#000;appearance:none;box-sizing:border-box;}
.input-group i{position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;color:#000;}
.btns{display:flex;justify-content:center;gap:15px;margin-top:25px;flex-wrap:wrap;}
button{padding:12px 30px;border-radius:25px;border:none;cursor:pointer;font-size:16px;font-weight:bold;background:linear-gradient(135deg,#ff7eb3,#ff758c);color:#fff;}
.otp-container{display:none;justify-content:center;align-items:center;gap:10px;margin-top:15px;}
.otp-box{width:40px;height:40px;font-size:20px;text-align:center;border-radius:10px;border:1px solid #000;background:#fff;color:#000;}
.error{color:#ff7070;font-size:14px;}
#signupForm, #dashboard, #adminPanel, #addWorkForm{display:none;}
#addWorkForm{max-height:70vh;overflow-y:auto;padding-right:10px;margin-top:80px;}
#addWorkForm::-webkit-scrollbar{width:8px;}
#addWorkForm::-webkit-scrollbar-thumb{background: rgba(255,255,255,0.4);border-radius:4px;}
#addWorkForm::-webkit-scrollbar-track{background: transparent;}
.input-group.radio-group{display:flex;justify-content:space-between;align-items:center;width:93%;margin:20px auto;padding-left:20px;}
.gender-option{display:flex;align-items:center;gap:10px;cursor:pointer;}
.gender-option input{display:none;}
.radio-circle{width:26px;height:26px;border-radius:50%;background:#fff;border:3px solid #e0e0e0;position:relative;}
.gender-option input:checked + .radio-circle::after{content:"";width:12px;height:12px;background:#000;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.dropdown-row{display:flex;gap:10px;width:95%;box-sizing:border-box;}
.dropdown-row > *{flex:1;}
.input-group-inline{position:relative;}
.input-group-inline select{width:95%;padding:12px 35px 12px 12px;border-radius:20px;border:none;outline:none;font-size:16px;background:#fff;appearance:none;box-sizing:border-box;}
.input-group-inline::after{content: "\25BC";position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:#555;}
.dropdown-row .input-group-inline:first-child{margin-left:30px;}
#vehicle_number{padding:12px 12px;border-radius:20px;border:none;outline:none;font-size:16px;background:#fff;box-sizing:border-box;}
</style>
</head>
<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN FORM -->
<div class="container" id="loginForm">
    <h2 class="form-title">Login</h2>
    <div class="input-group"><input type="text" id="login_username" placeholder="Username"><i class="fa fa-user"></i></div>
    <div class="input-group"><input type="password" id="login_password" placeholder="Password"><i class="fa fa-eye" onclick="app_togglePassword('login_password',this)"></i></div>
    <div class="btns">
        <button onclick="login_start()">Login</button>
        <button onclick="openSignup()">Signup</button>
        <button onclick="openAdmin()">Admin</button>
        <button onclick="openAddWork()">Add Worker</button>
    </div>
</div>

<!-- ADD WORKER FORM -->
<div class="container" id="addWorkForm">
<h2 class="form-title">Add Worker</h2>
<div class="input-group"><input type="text" id="worker_name" placeholder="Full Name"><i class="fa fa-user"></i></div>
<div class="input-group"><input type="text" id="worker_father" placeholder="Father Name"><i class="fa fa-user"></i></div>
<div class="input-group"><input type="text" id="worker_dob" placeholder="Date of Birth"><i class="fa fa-calendar"></i></div>
<div class="input-group radio-group">
<label class="gender-option"><input type="radio" name="worker_gender" value="male"><span class="radio-circle"></span><img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" width="24"></label>
<label class="gender-option"><input type="radio" name="worker_gender" value="female"><span class="radio-circle"></span><img src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png" width="24"></label>
<label class="gender-option"><input type="radio" name="worker_gender" value="other"><span class="radio-circle"></span><img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" width="24"></label>
</div>
<div class="input-group"><input type="text" id="worker_mobile" placeholder="Mobile Number"><i class="fa fa-phone"></i></div>
<div class="input-group"><input type="email" id="worker_email" placeholder="Email Address"><i class="fa fa-envelope"></i></div>
<div class="input-group"><input type="text" id="worker_address" placeholder="Address"><i class="fa fa-home"></i></div>

<div class="dropdown-row">
<div class="input-group-inline">
<select id="categorySelect"><option value="">Select Any One</option><option value="workers">Workers</option><option value="vehicle">Vehicle</option></select>
</div>
<div class="input-group-inline">
<select id="subCategorySelect"><option value="">Select Skill / Vehicle</option></select>
</div>
<input type="text" id="vehicle_number" placeholder="Vehicle Number" style="display:none;">
</div>

<div class="btns">
<button onclick="worker_save()">Submit Worker</button>
<button onclick="backLogin()">Back</button>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// Worker & Vehicle Lists
const workersList = ["Labour","Helper","Mason","Plumber","Electrician"];
const vehicleList = ["Taxi","Bike","Tempo","Bus","Truck","All Vehicles"];

// Elements
const categorySelect=document.getElementById("categorySelect");
const subCategorySelect=document.getElementById("subCategorySelect");
const vehicleNumber=document.getElementById("vehicle_number");

// Populate subcategory based on main category
categorySelect.addEventListener("change", function(){
    const value=this.value;
    subCategorySelect.innerHTML='<option value="">Select Skill / Vehicle</option>';
    vehicleNumber.style.display="none";
    if(value==="workers"){
        workersList.forEach(w=>{let o=document.createElement("option");o.value=w;o.text=w;subCategorySelect.appendChild(o);});
    } else if(value==="vehicle"){
        vehicleList.forEach(v=>{let o=document.createElement("option");o.value=v;o.text=v;subCategorySelect.appendChild(o);});
    }
});

// Show vehicle number only for vehicle type
subCategorySelect.addEventListener("change", function(){
    vehicleNumber.style.display=(categorySelect.value==="vehicle" && this.value!=="")?"block":"none";
});

// Dropdown color
document.querySelectorAll('.input-group-inline select').forEach(select=>{
    select.style.color=select.value===""?"#888":"#000";
    select.addEventListener('change', function(){this.style.color=this.value===""?"#888":"#000";});
});

// Date picker
flatpickr("#worker_dob",{dateFormat:"d/m/Y",defaultDate:"2000-01-01"});

// Toggle password
window.app_togglePassword=function(id,icon){var input=document.getElementById(id);if(input.type==="password"){input.type="text";icon.classList.replace("fa-eye","fa-eye-slash");}else{input.type="password";icon.classList.replace("fa-eye-slash","fa-eye");}};

// Forms
var loginForm=document.getElementById("loginForm");
var addWorkForm=document.getElementById("addWorkForm");

// Back to login
window.backLogin=function(){addWorkForm.style.display="none";loginForm.style.display="block";document.getElementById("worker_name").value="";document.getElementById("worker_father").value="";document.getElementById("worker_dob").value="";document.getElementById("worker_mobile").value="";document.getElementById("worker_email").value="";document.getElementById("worker_address").value="";document.querySelectorAll('input[name="worker_gender"]').forEach(r=>r.checked=false);categorySelect.selectedIndex=0;subCategorySelect.selectedIndex=0;vehicleNumber.style.display="none";};

// Open add worker form
window.openAddWork=function(){loginForm.style.display="none";addWorkForm.style.display="block";};

// Save worker
window.worker_save=function(){
    var workers=JSON.parse(localStorage.getItem("workers"))||[];
    workers.push({
        name:document.getElementById("worker_name").value,
        father:document.getElementById("worker_father").value,
        dob:document.getElementById("worker_dob").value,
        gender:document.querySelector('input[name="worker_gender"]:checked')?.value||'',
        mobile:document.getElementById("worker_mobile").value,
        email:document.getElementById("worker_email").value,
        address:document.getElementById("worker_address").value,
        category:categorySelect.value,
        subCategory:subCategorySelect.value,
        vehicleNumber:vehicleNumber.value
    });
    localStorage.setItem("workers",JSON.stringify(workers));
    alert("Worker Added!");
    backLogin();
};

});
</script>
</body>
</html>
