<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillHub Worker Registration</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: white;
}

button {
    background: #ff758c;
}

/* 👇 iske baad likho */
.file-btn {
    background: #28a745;
}

.file-btn:hover {
    background: #218838;
}
    
.container {
    width: 700px;
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
}

h2, h3 {
    margin-top: 15px;
}

input, select {
    width: 95%;
    height: 45px;
    margin: 10px 0;
    border-radius: 50px;
    border: none;
    padding: 0 15px;
}

/* Gender */
.gender-box {
    display: flex;
    gap: 20px;
}

/* Buttons */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 50px;
    background: #ff758c;
    color: white;
    cursor: pointer;
}

/* SERVICE ROW */
.service-row {
    display: flex;
    gap: 10px;
    align-items: center;
}

.service-row select,
.service-row .vehicle-box {
    flex: 1;
}

/* Vehicle Input */
.vehicle-box input {
    width: 85%;
    height: 45px;
    border-radius: 50px;
    border: none;
    padding: 0 15px;
}

/* DOCUMENT BOX */
.doc-box {
    background: rgba(255,255,255,0.15);
    padding: 15px;
    border-radius: 15px;
    margin-top: 10px;
}

/* DOCUMENT ROW */
.doc-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.2);
    padding: 2px 10px;
    margin: 3px 0;
    border-radius: 25px;
    height: 28px;
}

/* LEFT SIDE */
.doc-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* TEXT */
.doc-left span {
    font-size: 13px;
}

/* CHECKBOX CENTER */
.doc-left input[type="checkbox"] {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 16px;
}

/* RIGHT TEXT */
.selected-text {
    min-width: 80px;
    text-align: right;
    font-size: 12px;
}

/* Hide default file input */
#cv {
    display: none;
}
</style>

</head>

<body>

<h1 style="text-align:center;">SkillHub Hiring Services</h1>

<div class="container">

<h2>Worker Registration</h2>

<h3>Personal Details</h3>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="dob" placeholder="Date of Birth">

<div class="gender-box">
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Other"> Other</label>
</div>

<h3>Contact Details</h3>

<input type="text" id="mobile" placeholder="Mobile Number">
<input type="email" id="email" placeholder="Email">
<input type="text" id="address" placeholder="Address">

<h3>Service Details</h3>

<div class="service-row">

<select id="type" onchange="loadOptions()">
<option value="">Select Type</option>
<option value="worker">Worker</option>
<option value="vehicle">Vehicle</option>
</select>

<select id="subtype"></select>

<div id="vehicleBox" class="vehicle-box" style="display:none;">
<input type="text" placeholder="Vehicle Number">
</div>

</div>

<h3>Documents</h3>

<div class="doc-box">

<label class="doc-item">
    <div class="doc-left">
        <span>Aadhar</span>
        <input type="checkbox" value="Aadhar">
    </div>
    <span class="selected-text"></span>
</label>

<label class="doc-item">
    <div class="doc-left">
        <span>Passport</span>
        <input type="checkbox" value="Passport">
    </div>
    <span class="selected-text"></span>
</label>

<label class="doc-item">
    <div class="doc-left">
        <span>Driving License</span>
        <input type="checkbox" value="Driving License">
    </div>
    <span class="selected-text"></span>
</label>

<label class="doc-item">
    <div class="doc-left">
        <span>Photo</span>
        <input type="checkbox" value="Photo">
    </div>
    <span class="selected-text"></span>
</label>
    
</div>

<h3>Upload CV</h3>

<input type="file" id="cv" onchange="updateButton()">
<button id="fileBtn" onclick="handleFile()">Choose File</button>

<br><br>

<button onclick="save()">Submit</button>
<button onclick="resetForm()">Reset</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>

flatpickr("#dob", { dateFormat: "d/m/Y" });

const workerList = ["Labour","Helper","Mason","Carpenter","Electrician"];
const vehicleList = ["Bike","Car","Truck","Bus"];

function loadOptions() {
    let type = document.getElementById("type").value;
    let sub = document.getElementById("subtype");
    let vehicleBox = document.getElementById("vehicleBox");

    sub.innerHTML = "<option>Select Option</option>";

    if(type === "worker"){
        vehicleBox.style.display = "none";
        workerList.forEach(i => sub.add(new Option(i,i)));
    }
    else if(type === "vehicle"){
        vehicleBox.style.display = "block";
        vehicleList.forEach(i => sub.add(new Option(i,i)));
    }
}

// checkbox
const checkboxes = document.querySelectorAll(".doc-item input");

checkboxes.forEach(cb => {
    cb.addEventListener("change", function() {
        let text = this.closest(".doc-item").querySelector(".selected-text");
        text.innerHTML = this.checked ? "(Selected)" : "";
    });
});

// 🔥 FILE BUTTON LOGIC
function updateButton(){
    let file = document.getElementById("cv");
    let btn = document.getElementById("fileBtn");

    if(file.files.length){
        btn.innerText = "View File";
    } else {
        btn.innerText = "Choose File";
    }
}

function handleFile(){
    let file = document.getElementById("cv");

    if(!file.files.length){
        file.click();
    } else {
        let url = URL.createObjectURL(file.files[0]);
        window.open(url);
    }
}

function save(){
    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let gender = document.querySelector('input[name="gender"]:checked');

    if(!name || !mobile || !gender){
        alert("Fill all required fields");
        return;
    }

    alert("Saved Successfully");
}

function resetForm(){
    location.reload();
}

</script>

</body>
</html>
