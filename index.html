<!DOCTYPE html>
<html>
<head>
<title>SkillHub Hiring Services</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin-top:60px;
}

.title{
font-size:32px;
font-weight:bold;
color:#0078d7;
margin-bottom:25px;
}

.container{
background:white;
width:360px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

.btns{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

button{
padding:10px 20px;
font-size:16px;
background:#0078d7;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

.signup{
background:#28a745;
}

.back{
background:#ff9800;
margin-top:10px;
}

.otp-container{
display:flex;
justify-content:center;
gap:4px;
margin-top:10px;
display:none;
}

.otp-box{
width:30px;
height:30px;
font-size:16px;
text-align:center;
}

/* Signup form hidden */
#signupForm{
display:none;
}

</style>

</head>

<body>

<h1 class="title">SkillHub & Hiring Services</h1>

<!-- LOGIN FORM -->

<div class="container" id="loginForm">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username"><br>

<input type="password" id="password" placeholder="Password"><br>

<div class="otp-container" id="otpContainer">
<input class="otp-box" maxlength="1" disabled onkeyup="move(this,0)">
<input class="otp-box" maxlength="1" disabled onkeyup="move(this,1)">
<input class="otp-box" maxlength="1" disabled onkeyup="move(this,2)">
<input class="otp-box" maxlength="1" disabled onkeyup="move(this,3)">
<input class="otp-box" maxlength="1" disabled onkeyup="move(this,4)">
<input class="otp-box" maxlength="1" disabled onkeyup="move(this,5)">
</div>

<div class="btns">
<button onclick="login()">Login</button>
<button class="signup" onclick="openSignup()">Signup</button>
</div>

</div>


<!-- SIGNUP FORM -->

<div class="container" id="signupForm">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name"><br>

<input type="text" placeholder="Mobile Number"><br>

<input type="text" placeholder="Username"><br>

<input type="password" placeholder="Password"><br>

<input type="password" placeholder="Confirm Password"><br>

<button>Create Account</button>

<br>

<button class="back" onclick="backLogin()">Back to Login</button>

</div>


<script>

var generatedOTP;
var otpEnabled=false;

function login(){

var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

if(user=="" || pass==""){
alert("Please enter Username and Password");
return;
}

generatedOTP=Math.floor(100000 + Math.random()*900000);
alert("WhatsApp OTP: "+generatedOTP);

document.getElementById("otpContainer").style.display="flex";

otpEnabled=true;

var boxes=document.getElementsByClassName("otp-box");

for(var i=0;i<boxes.length;i++){
boxes[i].disabled=false;
}

boxes[0].focus();

}

function move(field,index){

if(!otpEnabled) return;

var boxes=document.getElementsByClassName("otp-box");

if(field.value.length==1 && index<5){
boxes[index+1].focus();
}

var entered="";
for(var i=0;i<6;i++){
entered+=boxes[i].value;
}

if(entered.length==6){
if(entered==generatedOTP){
window.location="dashboard.html";
}
else{
alert("Wrong OTP");
}
}

}

/* OPEN SIGNUP */

function openSignup(){

document.getElementById("loginForm").style.display="none";
document.getElementById("signupForm").style.display="block";

}

/* BACK TO LOGIN */

function backLogin(){

document.getElementById("signupForm").style.display="none";
document.getElementById("loginForm").style.display="block";

}

</script>

</body>
</html>
